name: Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check conflict markers
        run: |
          if git grep -n -E '^(<<<<<<<|>>>>>>>)' -- apps packages scripts VERSION; then
            echo "Conflict markers found"
            exit 1
          fi

      - name: Check JavaScript syntax
        run: find apps packages scripts \( -name "*.js" -o -name "*.mjs" \) -print0 | xargs -0 -n1 node --check

      - name: Install pinned test dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run integration browser tests
        run: npm run test:integration
