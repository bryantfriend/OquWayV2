<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OquWay - Super Admin Dashboard</title>
    <!-- Import map for Firebase -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js",
                "firebase/functions": "https://www.gstatic.com/firebasejs/10.11.1/firebase-functions.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.11.1/firebase-storage.js"
            }
        }
    </script>
    <style>
        :root {
            --ink: #102033;
            --muted: #64748b;
            --line: #d8e3ef;
            --paper: #ffffff;
            --blue: #1d4ed8;
            --green: #059669;
            --red: #dc2626;
            --sand: #fff7ed;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 12%, rgba(29,78,216,0.14), transparent 32%),
                radial-gradient(circle at 88% 4%, rgba(5,150,105,0.16), transparent 30%),
                linear-gradient(135deg, #f8fbff 0%, #eef8f4 50%, #fff8ed 100%);
        }

        button,
        input,
        select {
            font-family: inherit;
        }

        .header {
            display: none;
        }

        main {
            min-height: 100vh;
        }

        .sa-shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            min-height: 100vh;
        }

        .sa-sidebar {
            background: rgba(16,32,51,0.96);
            color: white;
            padding: 28px 18px;
        }

        .sa-brand {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .sa-sidebar p {
            color: #cbd5e1;
            font-weight: 800;
            margin-bottom: 28px;
        }

        .sa-sidebar-title {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sa-version-badge {
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 999px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.03em;
        }

        .sa-side-link {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: white;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: left;
            font-weight: 900;
        }

        .sa-side-link-active {
            background: white;
            color: var(--ink);
        }

        .sa-danger-link,
        .sa-danger-btn {
            background: #fee2e2;
            color: var(--red);
        }

        .sa-main {
            padding: 28px;
            max-width: 1500px;
        }

        .sa-topbar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .sa-eyebrow {
            margin: 0 0 6px;
            color: var(--blue);
            text-transform: uppercase;
            font-size: 0.76rem;
            letter-spacing: 0.14em;
            font-weight: 900;
        }

        .sa-topbar h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: -0.06em;
            line-height: 0.95;
        }

        .sa-admin-card,
        .sa-card,
        .sa-access-card,
        .sa-loading {
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(16,32,51,0.1);
        }

        .sa-admin-card {
            padding: 14px 18px;
            display: grid;
            gap: 3px;
            min-width: 220px;
        }

        .sa-admin-card span,
        .sa-admin-card small,
        .sa-card p,
        .sa-empty,
        .sa-summary {
            color: var(--muted);
            font-weight: 700;
        }

        .sa-card {
            padding: 20px;
        }

        .sa-card h2 {
            margin: 0 0 14px;
        }

        .sa-stack {
            display: grid;
            gap: 18px;
        }

        .sa-grid {
            display: grid;
            gap: 18px;
        }

        .sa-grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .sa-metric strong {
            display: block;
            font-size: 3rem;
            letter-spacing: -0.06em;
        }

        .sa-overview {
            display: grid;
            gap: 18px;
        }

        .sa-overview-head {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-end;
        }

        .sa-overview-head h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            letter-spacing: -0.05em;
            line-height: 0.95;
        }

        .sa-overview-head p,
        .sa-overview-head-actions span,
        .sa-overview-card p,
        .sa-feed-row small,
        .sa-search-group p {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-overview-head-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .sa-overview-grid {
            display: grid;
            gap: 18px;
        }

        .sa-overview-grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sa-overview-card {
            display: grid;
            gap: 14px;
        }

        .sa-overview-card h2 {
            margin: 0;
        }

        .sa-overview-skeleton {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .sa-overview-skeleton span {
            min-height: 96px;
            border-radius: 22px;
            background: linear-gradient(90deg, #e2e8f0 0%, #f8fafc 50%, #e2e8f0 100%);
            background-size: 220% 100%;
            animation: saShimmer 1.2s ease-in-out infinite;
        }

        .sa-action-list,
        .sa-health-list,
        .sa-feed,
        .sa-roadmap,
        .sa-checklist,
        .sa-search-groups {
            display: grid;
            gap: 10px;
        }

        .sa-action-item {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 12px;
            background: #fbfdff;
        }

        .sa-action-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: #eff6ff;
            color: var(--blue);
            font-weight: 900;
            font-size: 0.8rem;
        }

        .sa-action-item strong {
            display: block;
            font-size: 1.35rem;
            letter-spacing: -0.04em;
        }

        .sa-action-item span {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-action-danger {
            border-color: #fecaca;
            background: #fff7f7;
        }

        .sa-action-warning {
            border-color: #fed7aa;
            background: #fffaf0;
        }

        .sa-action-good {
            border-color: #bbf7d0;
            background: #f0fdf4;
        }

        .sa-quick-actions,
        .sa-mini-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .sa-quick-btn,
        .sa-mini-metric {
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 15px;
            background: #fbfdff;
        }

        .sa-quick-btn {
            cursor: pointer;
            text-align: left;
            color: var(--ink);
            display: grid;
            gap: 4px;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .sa-quick-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: #bfdbfe;
            box-shadow: 0 16px 34px rgba(16,32,51,0.08);
        }

        .sa-quick-btn span,
        .sa-mini-metric strong {
            font-weight: 900;
        }

        .sa-quick-btn small,
        .sa-mini-metric span {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-mini-metric strong {
            display: block;
            font-size: 1.7rem;
            letter-spacing: -0.04em;
        }

        .sa-health-row,
        .sa-feed-row,
        .sa-roadmap-row,
        .sa-check-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 10px 12px;
            background: #fbfdff;
        }

        .sa-health-row span,
        .sa-roadmap-row span,
        .sa-check-row p {
            margin: 0;
            font-weight: 900;
        }

        .sa-health-row strong {
            color: var(--muted);
            overflow-wrap: anywhere;
            text-align: right;
        }

        .sa-health-badge,
        .sa-roadmap-badge,
        .sa-check-row span {
            border-radius: 999px;
            padding: 4px 8px;
            font-style: normal;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sa-health-good,
        .sa-roadmap-done,
        .sa-check-complete span {
            background: #dcfce7;
            color: #166534;
        }

        .sa-health-warning,
        .sa-roadmap-in-progress,
        .sa-check-warning span {
            background: #ffedd5;
            color: #c2410c;
        }

        .sa-health-danger,
        .sa-check-incomplete span {
            background: #fee2e2;
            color: #b91c1c;
        }

        .sa-roadmap-planned {
            background: #e0f2fe;
            color: #0369a1;
        }

        .sa-score-head {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
        }

        .sa-score-head strong {
            font-size: 2.8rem;
            letter-spacing: -0.06em;
            color: var(--blue);
        }

        .sa-progress {
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            background: #e2e8f0;
        }

        .sa-progress span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--blue), var(--green));
        }

        .sa-segmented {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #f8fafc;
        }

        .sa-segmented button {
            border: 0;
            border-radius: 12px;
            padding: 8px 11px;
            cursor: pointer;
            color: var(--muted);
            background: transparent;
            font-weight: 900;
        }

        .sa-segmented .is-active {
            background: white;
            color: var(--blue);
            box-shadow: 0 8px 18px rgba(16,32,51,0.08);
        }

        .sa-growth-svg {
            width: 100%;
            height: auto;
            min-height: 240px;
        }

        .sa-growth-svg line {
            stroke: #e2e8f0;
            stroke-width: 1;
        }

        .sa-growth-svg polyline {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sa-growth-svg text {
            fill: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .sa-chart-label {
            text-anchor: middle;
        }

        .sa-chart-legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--muted);
            font-weight: 900;
        }

        .sa-chart-legend span {
            display: inline-flex;
            gap: 7px;
            align-items: center;
        }

        .sa-chart-legend i {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            display: inline-block;
        }

        .sa-feed-row {
            grid-template-columns: auto minmax(0, 1fr) auto;
        }

        .sa-feed-row > span {
            border-radius: 999px;
            padding: 5px 9px;
            background: #eff6ff;
            color: var(--blue);
            font-size: 0.72rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .sa-feed-row strong,
        .sa-feed-row small {
            display: block;
            overflow-wrap: anywhere;
        }

        .sa-overview-search {
            text-transform: none;
            letter-spacing: 0;
            color: var(--ink);
            font-size: 0.95rem;
        }

        .sa-search-groups {
            grid-template-columns: repeat(5, minmax(0, 1fr));
            align-items: start;
        }

        .sa-search-group {
            display: grid;
            gap: 8px;
            min-width: 0;
        }

        .sa-search-group h3 {
            margin: 0;
            font-size: 0.9rem;
        }

        .sa-search-group button {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fbfdff;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            display: grid;
            gap: 3px;
        }

        .sa-search-group button span {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .sa-form,
        .sa-filters {
            display: grid;
            gap: 10px;
            align-items: end;
        }

        .sa-form-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sa-form-5 {
            grid-template-columns: 1.2fr 0.7fr 0.7fr 1fr 1.1fr auto;
        }

        .sa-form-6 {
            grid-template-columns: 1.2fr 1fr 0.7fr 0.7fr 1fr auto;
        }

        .sa-form-student {
            grid-template-columns: 1.1fr 1fr 1fr 0.8fr 1fr 1fr 1fr auto;
        }

        .sa-form-assignment {
            grid-template-columns: 1.4fr 0.8fr 1.1fr 0.8fr auto;
        }

        .sa-filters {
            grid-template-columns: 1fr 1fr 1fr auto;
            margin-bottom: 16px;
        }

        label {
            display: grid;
            gap: 5px;
            font-size: 0.78rem;
            font-weight: 900;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .sa-password-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .sa-text-link {
            border: 0;
            background: transparent;
            color: var(--blue);
            padding: 0;
            font: inherit;
            font-size: 0.78rem;
            font-weight: 900;
            text-transform: none;
            letter-spacing: 0;
            cursor: pointer;
        }

        .sa-text-link:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        input,
        select,
        textarea {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 11px;
            background: white;
            color: var(--ink);
            font-size: 0.96rem;
            box-sizing: border-box;
            width: 100%;
        }

        textarea {
            min-height: 88px;
            resize: vertical;
        }

        .sa-btn {
            border: 0;
            border-radius: 15px;
            background: var(--blue);
            color: white;
            padding: 11px 14px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .sa-btn-secondary {
            background: #eff6ff;
            color: var(--blue);
            border: 1px solid #bfdbfe;
        }

        .sa-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .sa-table,
        .sa-student-list,
        .sa-location-list,
        .sa-user-list {
            display: grid;
            gap: 12px;
        }

        .sa-grid-4 {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .sa-page-head,
        .sa-section-title {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .sa-page-head h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.2rem);
            letter-spacing: -0.05em;
            line-height: 0.95;
        }

        .sa-page-head p,
        .sa-section-title p {
            margin: 6px 0 0;
            color: var(--muted);
            font-weight: 800;
        }

        .sa-location-card {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            padding: 16px;
            box-shadow: 0 14px 40px rgba(16,32,51,0.06);
        }

        .sa-location-summary {
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
        }

        .sa-location-photo {
            width: 76px;
            height: 76px;
            border-radius: 18px;
            object-fit: cover;
            border: 1px solid var(--line);
            background: white;
        }

        .sa-location-photo-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            background: #eff6ff;
            font-weight: 900;
            font-size: 1.25rem;
        }

        .sa-location-main {
            min-width: 0;
        }

        .sa-location-title-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .sa-location-title-row h3 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
        }

        .sa-location-main p,
        .sa-location-main small {
            margin: 3px 0;
            color: var(--muted);
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .sa-location-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .sa-location-meta span {
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1e40af;
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.78rem;
            font-weight: 900;
        }

        .sa-location-detail {
            margin-top: 16px;
            border-top: 1px solid var(--line);
            padding-top: 16px;
        }

        .sa-location-form {
            display: grid;
            gap: 14px;
        }

        .sa-location-form-section {
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.78);
        }

        .sa-location-form-section h3 {
            margin: 0 0 12px;
            font-size: 1rem;
            letter-spacing: -0.01em;
        }

        .sa-location-fields {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            align-items: start;
        }

        .sa-field-wide {
            grid-column: span 2;
        }

        .sa-check {
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 12px;
            background: white;
            display: flex;
            gap: 9px;
            align-items: center;
            color: var(--ink);
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.94rem;
        }

        .sa-check input {
            width: auto;
        }

        .sa-location-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .sa-user-filters {
            display: grid;
            grid-template-columns: 1.4fr 1fr 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }

        .sa-role-card-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(220px, 1fr));
            gap: 16px;
        }

        .sa-role-card {
            position: relative;
            overflow: hidden;
            min-height: 190px;
            display: grid;
            align-content: space-between;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 22px;
            padding: 18px;
            color: #0f172a;
            text-align: left;
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
            cursor: pointer;
            isolation: isolate;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .sa-role-card::after {
            content: "";
            position: absolute;
            inset: auto -36px -68px auto;
            width: 170px;
            height: 170px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.5);
            z-index: -1;
        }

        .sa-role-card:hover,
        .sa-role-card.is-active {
            transform: translateY(-5px);
            border-color: rgba(37, 99, 235, 0.42);
            box-shadow: 0 24px 58px rgba(37, 99, 235, 0.18);
        }

        .sa-role-card.is-active::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 2px solid rgba(37, 99, 235, 0.7);
            border-radius: inherit;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7), 0 0 0 5px rgba(37, 99, 235, 0.11);
            pointer-events: none;
        }

        .sa-role-card-all { background: linear-gradient(135deg, #eff6ff 0%, #ecfeff 58%, #ffffff 100%); }
        .sa-role-card-student { background: linear-gradient(135deg, #dcfce7 0%, #ecfdf5 58%, #ffffff 100%); }
        .sa-role-card-teacher { background: linear-gradient(135deg, #ede9fe 0%, #f5f3ff 58%, #ffffff 100%); }
        .sa-role-card-parent { background: linear-gradient(135deg, #fce7f3 0%, #fff7ed 68%, #ffffff 100%); }
        .sa-role-card-admin { background: linear-gradient(135deg, #ffedd5 0%, #fef3c7 62%, #ffffff 100%); }
        .sa-role-card-super { background: linear-gradient(135deg, #ccfbf1 0%, #e0f2fe 56%, #ffffff 100%); }

        .sa-role-card-top {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;

        .sa-orbit-fruit-3 {

            left: 56px;
        }

        .sa-orbit-fruit-4 {
            top: 56px;
            left: -2px;
        }

        .sa-staff-reset-modal {
            width: min(460px, 100%);
        }

        .sa-staff-reset-modal .sa-message {
            margin: 14px 0 0;
        }

        .sa-modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .sa-user-edit-backdrop {
            z-index: 20;
            align-items: stretch;
            overflow-y: auto;
            padding: 28px;
            background:
                radial-gradient(circle at 18% 12%, rgba(37,99,235,0.24), transparent 32%),
                radial-gradient(circle at 82% 4%, rgba(20,184,166,0.22), transparent 30%),
                rgba(15,23,42,0.62);
            backdrop-filter: blur(10px);
        }

        .sa-user-edit-modal {
            width: min(1040px, 100%);
            max-height: calc(100vh - 56px);
            margin: auto;
            padding: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            border: 1px solid rgba(255,255,255,0.72);
            border-radius: 22px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            box-shadow: 0 34px 110px rgba(15,23,42,0.34);
        }

        .sa-user-edit-hero {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            padding: 24px 26px 20px;
            border-bottom: 1px solid var(--line);
            background:
                linear-gradient(135deg, rgba(239,246,255,0.98), rgba(236,253,245,0.94)),
                #ffffff;
        }

        .sa-user-edit-identity {
            min-width: 0;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 16px;
            align-items: center;
        }

        .sa-user-edit-identity .sa-avatar {
            width: 70px;
            height: 70px;
            font-size: 1.45rem;
            box-shadow: 0 16px 34px rgba(15,23,42,0.14);
        }

        .sa-user-edit-identity h2 {
            margin: 0;
            font-size: 1.65rem;
            line-height: 1.05;
            letter-spacing: 0;
            overflow-wrap: anywhere;
        }

        .sa-user-edit-meta {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-weight: 900;
        }

        .sa-modal-close {
            width: 42px;
            height: 42px;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            background: rgba(255,255,255,0.9);
            color: var(--ink);
            cursor: pointer;
            font-size: 1.45rem;
            line-height: 1;
            font-weight: 900;
            box-shadow: 0 10px 24px rgba(15,23,42,0.10);
        }

        .sa-user-edit-body {
            min-height: 0;
            overflow-y: auto;
            padding: 22px 26px;
        }

        .sa-user-edit-body .sa-user-form {
            gap: 18px;
        }

        .sa-user-edit-body .sa-location-form-section {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            background: rgba(255,255,255,0.86);
            box-shadow: 0 12px 30px rgba(15,23,42,0.05);
        }

        .sa-user-edit-body .sa-user-fields {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sa-user-edit-actions {
            padding: 16px 26px 22px;
            border-top: 1px solid var(--line);
            background: rgba(255,255,255,0.92);
        }

        .sa-access-card,
        .sa-loading {
            max-width: 620px;
            margin: 80px auto;
            padding: 30px;
            text-align: center;
        }

        .sa-spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #dbeafe;
            border-top-color: var(--blue);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: saSpin 0.9s linear infinite;
        }

        @keyframes saSpin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes saFruitOrbit {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes saFruitCounterOrbit {
            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes saDeletePulse {
            from {
                transform: scale(1) rotate(-4deg);
                opacity: 1;
            }

            to {
                transform: scale(0.82) rotate(4deg);
                opacity: 0.7;
            }
        }

        @keyframes saShimmer {
            to {
                background-position: -220% 0;
            }
        }

        @media (max-width: 1050px) {
            .sa-shell,
            .sa-grid-3,
            .sa-grid-4,
            .sa-form-5,
            .sa-form-6,
            .sa-form-assignment,
            .sa-form-student,
            .sa-filters,
            .sa-assignment-row,
            .sa-assignment-summary-grid,
            .sa-assignment-builder-grid,
            .sa-location-summary,
            .sa-location-fields,
            .sa-overview-grid-2,
            .sa-overview-skeleton,
            .sa-quick-actions,
            .sa-mini-grid,
            .sa-search-groups,
            .sa-user-filters,
            .sa-user-summary,
            .sa-user-fields,
            .sa-picker-grid,
            .sa-picker-row,
            .sa-role-card-grid,
            .sa-user-table-head {
                grid-template-columns: 1fr;
            }

            .sa-user-table-head {
                display: none;
            }

            .sa-page-head,
            .sa-section-title,
            .sa-overview-head {
                flex-direction: column;
            }

            .sa-field-wide {
                grid-column: auto;
            }

            .sa-action-item,
            .sa-health-row,
            .sa-feed-row,
            .sa-roadmap-row,
            .sa-check-row {
                grid-template-columns: 1fr;
            }

            .sa-health-row strong {
                text-align: left;
            }

            .sa-sidebar {
                position: static;
            }

            .sa-topbar {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        :root {
            --ink: #172033;
            --muted: #667085;
            --line: #e5e7eb;
            --paper: #ffffff;
            --blue: #2563eb;
            --green: #10b981;
            --red: #dc2626;
            --navy: #081426;
            --navy-2: #101b33;
            --purple: #7c3aed;
            --teal: #14b8a6;
            --amber: #f59e0b;
            --rose: #f43f5e;
            --shadow: 0 18px 45px rgba(16, 24, 40, 0.08);
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6f8fc;
            color: var(--ink);
        }

        .sa-shell {
            grid-template-columns: 292px minmax(0, 1fr);
            background:
                linear-gradient(135deg, rgba(124, 58, 237, 0.08), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #eef3fb 100%);
        }

        .sa-sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            box-sizing: border-box;
            padding: 22px 16px;
            display: flex;
            flex-direction: column;
            background:
                linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(8, 20, 38, 0.98)),
                radial-gradient(circle at 20% 0%, rgba(99, 102, 241, 0.32), transparent 35%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            overflow-y: auto;
        }

        .sa-brand-block {
            display: grid;
            grid-template-columns: 46px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            padding: 10px 8px 20px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sa-brand-mark {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: 900;
            background: linear-gradient(135deg, #7c3aed, #2563eb 55%, #14b8a6);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.28);
        }

        .sa-brand {
            font-size: 1.35rem;
            letter-spacing: 0;
        }

        .sa-brand-line {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sa-brand-block p {
            margin: 2px 0 0;
            color: #aebdde;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .sa-nav-group {
            display: grid;
            gap: 6px;
            margin-bottom: 18px;
        }

        .sa-nav-group > span {
            padding: 0 10px;
            color: #7d8bad;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 900;
        }

        .sa-side-link {
            margin: 0;
            min-height: 42px;
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr);
            align-items: center;
            gap: 9px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: #dbe5ff;
            font-size: 0.92rem;
            transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
        }

        .sa-side-link:hover {
            transform: translateX(2px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .sa-side-link-active {
            color: white;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.28);
        }

        .sa-nav-icon {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.09);
            color: #a5b4fc;
        }

        .sa-side-link-active .sa-nav-icon {
            color: white;
            background: rgba(255, 255, 255, 0.18);
        }

        .sa-danger-link {
            margin-top: 10px;
            color: #fecaca;
            background: rgba(220, 38, 38, 0.11);
        }

        .sa-system-card {
            margin-top: auto;
            border-radius: 8px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
        }

        .sa-system-card div {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sa-system-card p,
        .sa-system-card small {
            margin: 6px 0 0;
            color: #aebdde;
            font-weight: 700;
        }

        .sa-main {
            width: 100%;
            max-width: none;
            box-sizing: border-box;
            padding: 26px;
        }

        .sa-topbar {
            align-items: flex-start;
            padding: 18px;
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .sa-title-wrap {
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            gap: 14px;
            align-items: center;
            min-width: 280px;
        }

        .sa-title-badge {
            width: 52px;
            height: 52px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            color: white;
            font-size: 1.45rem;
            background: linear-gradient(135deg, #172554, #7c3aed);
        }

        .sa-title-wrap h1,
        .sa-overview-head h2,
        .sa-page-head h2 {
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            letter-spacing: 0;
            line-height: 1.05;
        }

        .sa-title-wrap p:last-child {
            margin: 6px 0 0;
            color: var(--muted);
            font-weight: 700;
        }

        .sa-topbar-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        .sa-topbar-actions label {
            min-width: 132px;
            text-transform: none;
            letter-spacing: 0;
            color: #475467;
        }

        .sa-topbar-actions select,
        .sa-topbar-actions input {
            min-height: 38px;
            border-radius: 8px;
            background: #f8fafc;
        }

        .sa-notification-btn {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            border: 1px solid #dbe4f0;
            background: white;
            color: var(--blue);
            font-size: 1.3rem;
            cursor: pointer;
        }

        .sa-admin-card {
            border-radius: 8px;
            box-shadow: none;
            background: #f8fafc;
        }

        .sa-profile-pill {
            min-width: 190px;
            padding: 10px 12px;
        }

        .sa-card,
        .sa-access-card,
        .sa-loading {
            border-radius: 8px;
            border: 1px solid rgba(226, 232, 240, 0.95);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow);
        }

        .sa-overview {
            gap: 20px;
        }

        .sa-overview-head {
            padding: 4px 2px;
        }

        .sa-overview-head-actions {
            align-items: center;
        }

        .sa-executive-metrics {
            display: grid;
            grid-template-columns: repeat(5, minmax(180px, 1fr));
            gap: 14px;
        }

        .sa-exec-metric {
            position: relative;
            overflow: hidden;
            min-height: 178px;
            display: grid;
            gap: 10px;
            padding: 18px;
        }

        .sa-exec-metric::after {
            content: "";
            position: absolute;
            inset: auto -35px -45px auto;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
        }

        .sa-tint-blue { background: linear-gradient(135deg, #eff6ff, #ffffff); }
        .sa-tint-teal { background: linear-gradient(135deg, #ecfeff, #ffffff); }
        .sa-tint-amber { background: linear-gradient(135deg, #fffbeb, #ffffff); }
        .sa-tint-purple { background: linear-gradient(135deg, #f5f3ff, #ffffff); }
        .sa-tint-rose { background: linear-gradient(135deg, #fff1f2, #ffffff); }

        .sa-metric-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sa-metric-icon {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            color: white;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
        }

        .sa-metric-top small,
        .sa-learning-card small {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-exec-metric > strong {
            font-size: 2.25rem;
            letter-spacing: 0;
            line-height: 1;
        }

        .sa-metric-change {
            width: fit-content;
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.76rem;
            font-weight: 900;
        }

        .is-positive { color: #047857; background: #d1fae5; }
        .is-negative { color: #b91c1c; background: #fee2e2; }
        .is-neutral { color: #475467; background: #eef2f7; }

        .sa-sparkline {
            width: 100%;
            min-height: 36px;
            margin-top: auto;
        }

        .sa-sparkline polyline {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sa-analytics-row {
            grid-template-columns: minmax(360px, 1.55fr) minmax(260px, 0.8fr) minmax(260px, 0.85fr);
        }

        .sa-ops-row {
            grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr);
        }

        .sa-section-title {
            align-items: center;
        }

        .sa-section-title h2,
        .sa-overview-card h2 {
            font-size: 1.08rem;
            letter-spacing: 0;
        }

        .sa-action-center-card .sa-action-list {
            gap: 8px;
        }

        .sa-action-item {
            border-radius: 8px;
            padding: 10px;
            background: #ffffff;
        }

        .sa-action-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .sa-action-item strong {
            font-size: 1.08rem;
        }

        .sa-action-danger { border-left: 4px solid #ef4444; }
        .sa-action-warning { border-left: 4px solid #f59e0b; }
        .sa-action-good { border-left: 4px solid #10b981; }
        .sa-action-muted { border-left: 4px solid #94a3b8; }

        .sa-health-row {
            grid-template-columns: minmax(0, 1fr) auto;
            border-radius: 8px;
            background: #f8fafc;
        }

        .sa-health-row span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .sa-health-row strong {
            font-weight: 900;
        }

        .sa-status-dot {
            width: 9px;
            height: 9px;
            display: inline-block;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
        }

        .sa-status-dot-good { background: #10b981; }
        .sa-status-dot-warning { background: #f59e0b; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.13); }
        .sa-status-dot-danger { background: #ef4444; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.13); }

        .sa-growth-svg {
            min-height: 250px;
            border-radius: 8px;
            background: linear-gradient(180deg, #ffffff, #f8fafc);
        }

        .sa-engagement-svg polyline:first-of-type {
            opacity: 0.55;
        }

        .sa-donut-wrap {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 210px;
        }

        .sa-donut-svg {
            width: 190px;
            height: 190px;
            transform: rotate(-90deg);
        }

        .sa-donut-track,
        .sa-donut-segment {
            fill: none;
            stroke-width: 14;
        }

        .sa-donut-track {
            stroke: #eef2f7;
        }

        .sa-donut-segment {
            stroke-linecap: round;
        }

        .sa-donut-center {
            position: absolute;
            display: grid;
            place-items: center;
            text-align: center;
        }

        .sa-donut-center strong {
            font-size: 1.65rem;
        }

        .sa-donut-center span {
            color: var(--muted);
            font-weight: 800;
            font-size: 0.78rem;
        }

        .sa-donut-legend,
        .sa-region-list {
            display: grid;
            gap: 10px;
        }

        .sa-donut-legend span {
            display: grid;
            grid-template-columns: 10px minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-weight: 800;
        }

        .sa-donut-legend i {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .sa-region-row {
            display: grid;
            grid-template-columns: minmax(90px, 1fr) 1.4fr auto;
            gap: 10px;
            align-items: center;
        }

        .sa-region-row strong,
        .sa-region-row span {
            display: block;
        }

        .sa-region-row span,
        .sa-region-row em {
            color: var(--muted);
            font-style: normal;
            font-weight: 800;
            font-size: 0.8rem;
        }

        .sa-region-bar {
            height: 9px;
            overflow: hidden;
            border-radius: 999px;
            background: #eef2f7;
        }

        .sa-region-bar span {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #7c3aed, #2563eb, #14b8a6);
        }

        .sa-learning-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .sa-learning-card {
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 86px;
        }

        .sa-learning-card > span {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            color: white;
            background: #2563eb;
        }

        .sa-learning-card strong,
        .sa-top-school-row strong {
            display: block;
            font-size: 1.45rem;
            line-height: 1;
        }

        .sa-learning-quest > span { background: #7c3aed; }
        .sa-learning-project > span { background: #f59e0b; }
        .sa-learning-activity > span { background: #14b8a6; }

        .sa-top-schools-table {
            display: grid;
            gap: 8px;
            overflow-x: auto;
        }

        .sa-top-schools-head,
        .sa-top-school-row {
            display: grid;
            grid-template-columns: minmax(180px, 1.5fr) 0.65fr 0.8fr 0.8fr 0.8fr;
            gap: 10px;
            align-items: center;
            min-width: 650px;
        }

        .sa-top-schools-head {
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 900;
        }

        .sa-top-school-row {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
            padding: 12px;
            color: var(--ink);
            text-align: left;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .sa-top-school-row:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
        }

        .sa-top-school-row strong {
            font-size: 0.95rem;
        }

        .sa-top-school-row span,
        .sa-top-school-row em {
            color: var(--muted);
            font-style: normal;
            font-weight: 900;
        }

        .sa-summary-strip {
            display: grid;
            grid-template-columns: minmax(260px, 1.2fr) minmax(260px, 1fr) minmax(240px, 0.9fr);
            gap: 18px;
            align-items: center;
            color: white;
            background:
                linear-gradient(135deg, rgba(124, 58, 237, 0.94), rgba(37, 99, 235, 0.94)),
                linear-gradient(90deg, #172554, #0f766e);
            border: 0;
        }

        .sa-summary-strip h2 {
            margin: 0;
            color: white;
            font-size: 1.25rem;
            letter-spacing: 0;
        }

        .sa-summary-strip .sa-eyebrow,
        .sa-summary-strip p {
            color: rgba(255, 255, 255, 0.75);
        }

        .sa-summary-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
