<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OquWay - Super Admin Dashboard</title>
    <!-- Import map for Firebase -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js",
                "firebase/functions": "https://www.gstatic.com/firebasejs/10.11.1/firebase-functions.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.11.1/firebase-storage.js"
            }
        }
    </script>
    <style>
        :root {
            --ink: #102033;
            --muted: #64748b;
            --line: #d8e3ef;
            --paper: #ffffff;
            --blue: #1d4ed8;
            --green: #059669;
            --red: #dc2626;
            --sand: #fff7ed;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 12%, rgba(29,78,216,0.14), transparent 32%),
                radial-gradient(circle at 88% 4%, rgba(5,150,105,0.16), transparent 30%),
                linear-gradient(135deg, #f8fbff 0%, #eef8f4 50%, #fff8ed 100%);
        }

        button,
        input,
        select {
            font-family: inherit;
        }

        .header {
            display: none;
        }

        main {
            min-height: 100vh;
        }

        .sa-shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            min-height: 100vh;
        }

        .sa-sidebar {
            background: rgba(16,32,51,0.96);
            color: white;
            padding: 28px 18px;
        }

        .sa-brand {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .sa-sidebar p {
            color: #cbd5e1;
            font-weight: 800;
            margin-bottom: 28px;
        }

        .sa-sidebar-title {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sa-version-badge {
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 999px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.03em;
        }

        .sa-side-link {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: white;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: left;
            font-weight: 900;
        }

        .sa-side-link-active {
            background: white;
            color: var(--ink);
        }

        .sa-danger-link,
        .sa-danger-btn {
            background: #fee2e2;
            color: var(--red);
        }

        .sa-main {
            padding: 28px;
            max-width: 1500px;
        }

        .sa-topbar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .sa-eyebrow {
            margin: 0 0 6px;
            color: var(--blue);
            text-transform: uppercase;
            font-size: 0.76rem;
            letter-spacing: 0.14em;
            font-weight: 900;
        }

        .sa-topbar h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: -0.06em;
            line-height: 0.95;
        }

        .sa-admin-card,
        .sa-card,
        .sa-access-card,
        .sa-loading {
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(16,32,51,0.1);
        }

        .sa-admin-card {
            padding: 14px 18px;
            display: grid;
            gap: 3px;
            min-width: 220px;
        }

        .sa-admin-card span,
        .sa-admin-card small,
        .sa-card p,
        .sa-empty,
        .sa-summary {
            color: var(--muted);
            font-weight: 700;
        }

        .sa-card {
            padding: 20px;
        }

        .sa-card h2 {
            margin: 0 0 14px;
        }

        .sa-stack {
            display: grid;
            gap: 18px;
        }

        .sa-grid {
            display: grid;
            gap: 18px;
        }

        .sa-grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .sa-metric strong {
            display: block;
            font-size: 3rem;
            letter-spacing: -0.06em;
        }

        .sa-overview {
            display: grid;
            gap: 18px;
        }

        .sa-overview-head {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-end;
        }

        .sa-overview-head h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            letter-spacing: -0.05em;
            line-height: 0.95;
        }

        .sa-overview-head p,
        .sa-overview-head-actions span,
        .sa-overview-card p,
        .sa-feed-row small,
        .sa-search-group p {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-overview-head-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .sa-overview-grid {
            display: grid;
            gap: 18px;
        }

        .sa-overview-grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sa-overview-card {
            display: grid;
            gap: 14px;
        }

        .sa-overview-card h2 {
            margin: 0;
        }

        .sa-overview-skeleton {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .sa-overview-skeleton span {
            min-height: 96px;
            border-radius: 22px;
            background: linear-gradient(90deg, #e2e8f0 0%, #f8fafc 50%, #e2e8f0 100%);
            background-size: 220% 100%;
            animation: saShimmer 1.2s ease-in-out infinite;
        }

        .sa-action-list,
        .sa-health-list,
        .sa-feed,
        .sa-roadmap,
        .sa-checklist,
        .sa-search-groups {
            display: grid;
            gap: 10px;
        }

        .sa-action-item {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 12px;
            background: #fbfdff;
        }

        .sa-action-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: #eff6ff;
            color: var(--blue);
            font-weight: 900;
            font-size: 0.8rem;
        }

        .sa-action-item strong {
            display: block;
            font-size: 1.35rem;
            letter-spacing: -0.04em;
        }

        .sa-action-item span {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-action-danger {
            border-color: #fecaca;
            background: #fff7f7;
        }

        .sa-action-warning {
            border-color: #fed7aa;
            background: #fffaf0;
        }

        .sa-action-good {
            border-color: #bbf7d0;
            background: #f0fdf4;
        }

        .sa-quick-actions,
        .sa-mini-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .sa-quick-btn,
        .sa-mini-metric {
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 15px;
            background: #fbfdff;
        }

        .sa-quick-btn {
            cursor: pointer;
            text-align: left;
            color: var(--ink);
            display: grid;
            gap: 4px;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .sa-quick-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: #bfdbfe;
            box-shadow: 0 16px 34px rgba(16,32,51,0.08);
        }

        .sa-quick-btn span,
        .sa-mini-metric strong {
            font-weight: 900;
        }

        .sa-quick-btn small,
        .sa-mini-metric span {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-mini-metric strong {
            display: block;
            font-size: 1.7rem;
            letter-spacing: -0.04em;
        }

        .sa-health-row,
        .sa-feed-row,
        .sa-roadmap-row,
        .sa-check-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 10px 12px;
            background: #fbfdff;
        }

        .sa-health-row span,
        .sa-roadmap-row span,
        .sa-check-row p {
            margin: 0;
            font-weight: 900;
        }

        .sa-health-row strong {
            color: var(--muted);
            overflow-wrap: anywhere;
            text-align: right;
        }

        .sa-health-badge,
        .sa-roadmap-badge,
        .sa-check-row span {
            border-radius: 999px;
            padding: 4px 8px;
            font-style: normal;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sa-health-good,
        .sa-roadmap-done,
        .sa-check-complete span {
            background: #dcfce7;
            color: #166534;
        }

        .sa-health-warning,
        .sa-roadmap-in-progress,
        .sa-check-warning span {
            background: #ffedd5;
            color: #c2410c;
        }

        .sa-health-danger,
        .sa-check-incomplete span {
            background: #fee2e2;
            color: #b91c1c;
        }

        .sa-roadmap-planned {
            background: #e0f2fe;
            color: #0369a1;
        }

        .sa-score-head {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
        }

        .sa-score-head strong {
            font-size: 2.8rem;
            letter-spacing: -0.06em;
            color: var(--blue);
        }

        .sa-progress {
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            background: #e2e8f0;
        }

        .sa-progress span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--blue), var(--green));
        }

        .sa-segmented {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #f8fafc;
        }

        .sa-segmented button {
            border: 0;
            border-radius: 12px;
            padding: 8px 11px;
            cursor: pointer;
            color: var(--muted);
            background: transparent;
            font-weight: 900;
        }

        .sa-segmented .is-active {
            background: white;
            color: var(--blue);
            box-shadow: 0 8px 18px rgba(16,32,51,0.08);
        }

        .sa-growth-svg {
            width: 100%;
            height: auto;
            min-height: 240px;
        }

        .sa-growth-svg line {
            stroke: #e2e8f0;
            stroke-width: 1;
        }

        .sa-growth-svg polyline {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sa-growth-svg text {
            fill: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .sa-chart-label {
            text-anchor: middle;
        }

        .sa-chart-legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--muted);
            font-weight: 900;
        }

        .sa-chart-legend span {
            display: inline-flex;
            gap: 7px;
            align-items: center;
        }

        .sa-chart-legend i {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            display: inline-block;
        }

        .sa-feed-row {
            grid-template-columns: auto minmax(0, 1fr) auto;
        }

        .sa-feed-row > span {
            border-radius: 999px;
            padding: 5px 9px;
            background: #eff6ff;
            color: var(--blue);
            font-size: 0.72rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .sa-feed-row strong,
        .sa-feed-row small {
            display: block;
            overflow-wrap: anywhere;
        }

        .sa-overview-search {
            text-transform: none;
            letter-spacing: 0;
            color: var(--ink);
            font-size: 0.95rem;
        }

        .sa-search-groups {
            grid-template-columns: repeat(5, minmax(0, 1fr));
            align-items: start;
        }

        .sa-search-group {
            display: grid;
            gap: 8px;
            min-width: 0;
        }

        .sa-search-group h3 {
            margin: 0;
            font-size: 0.9rem;
        }

        .sa-search-group button {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fbfdff;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            display: grid;
            gap: 3px;
        }

        .sa-search-group button span {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .sa-form,
        .sa-filters {
            display: grid;
            gap: 10px;
            align-items: end;
        }

        .sa-form-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sa-form-5 {
            grid-template-columns: 1.2fr 0.7fr 0.7fr 1fr 1.1fr auto;
        }

        .sa-form-6 {
            grid-template-columns: 1.2fr 1fr 0.7fr 0.7fr 1fr auto;
        }

        .sa-form-student {
            grid-template-columns: 1.1fr 1fr 1fr 0.8fr 1fr 1fr 1fr auto;
        }

        .sa-form-assignment {
            grid-template-columns: 1.4fr 0.8fr 1.1fr 0.8fr auto;
        }

        .sa-filters {
            grid-template-columns: 1fr 1fr 1fr auto;
            margin-bottom: 16px;
        }

        label {
            display: grid;
            gap: 5px;
            font-size: 0.78rem;
            font-weight: 900;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input,
        select,
        textarea {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 11px;
            background: white;
            color: var(--ink);
            font-size: 0.96rem;
            box-sizing: border-box;
            width: 100%;
        }

        textarea {
            min-height: 88px;
            resize: vertical;
        }

        .sa-btn {
            border: 0;
            border-radius: 15px;
            background: var(--blue);
            color: white;
            padding: 11px 14px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .sa-btn-secondary {
            background: #eff6ff;
            color: var(--blue);
            border: 1px solid #bfdbfe;
        }

        .sa-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .sa-table,
        .sa-student-list,
        .sa-location-list,
        .sa-user-list {
            display: grid;
            gap: 12px;
        }

        .sa-grid-4 {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .sa-page-head,
        .sa-section-title {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .sa-page-head h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.2rem);
            letter-spacing: -0.05em;
            line-height: 0.95;
        }

        .sa-page-head p,
        .sa-section-title p {
            margin: 6px 0 0;
            color: var(--muted);
            font-weight: 800;
        }

        .sa-location-card {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            padding: 16px;
            box-shadow: 0 14px 40px rgba(16,32,51,0.06);
        }

        .sa-location-summary {
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
        }

        .sa-location-photo {
            width: 76px;
            height: 76px;
            border-radius: 18px;
            object-fit: cover;
            border: 1px solid var(--line);
            background: white;
        }

        .sa-location-photo-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            background: #eff6ff;
            font-weight: 900;
            font-size: 1.25rem;
        }

        .sa-location-main {
            min-width: 0;
        }

        .sa-location-title-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .sa-location-title-row h3 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
        }

        .sa-location-main p,
        .sa-location-main small {
            margin: 3px 0;
            color: var(--muted);
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .sa-location-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .sa-location-meta span {
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1e40af;
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.78rem;
            font-weight: 900;
        }

        .sa-location-detail {
            margin-top: 16px;
            border-top: 1px solid var(--line);
            padding-top: 16px;
        }

        .sa-location-form {
            display: grid;
            gap: 14px;
        }

        .sa-location-form-section {
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.78);
        }

        .sa-location-form-section h3 {
            margin: 0 0 12px;
            font-size: 1rem;
            letter-spacing: -0.01em;
        }

        .sa-location-fields {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            align-items: start;
        }

        .sa-field-wide {
            grid-column: span 2;
        }

        .sa-check {
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 12px;
            background: white;
            display: flex;
            gap: 9px;
            align-items: center;
            color: var(--ink);
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.94rem;
        }

        .sa-check input {
            width: auto;
        }

        .sa-location-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .sa-user-filters {
            display: grid;
            grid-template-columns: 1.4fr 1fr 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }

        .sa-user-card {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            padding: 16px;
            box-shadow: 0 14px 40px rgba(16,32,51,0.06);
        }

        .sa-user-summary {
            display: grid;
            grid-template-columns: 58px minmax(0, 1fr) minmax(180px, 0.8fr) auto;
            gap: 14px;
            align-items: center;
        }

        .sa-user-main {
            min-width: 0;
        }

        .sa-user-main h3,
        .sa-user-main p,
        .sa-user-main small {
            margin: 3px 0;
            overflow-wrap: anywhere;
        }

        .sa-user-main p,
        .sa-user-main small,
        .sa-user-meta span {
            color: var(--muted);
            font-weight: 800;
        }

        .sa-user-meta {
            display: grid;
            gap: 5px;
            font-size: 0.82rem;
        }

        .sa-user-form {
            display: grid;
            gap: 14px;
        }

        .sa-user-fields {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            align-items: start;
        }

        .sa-user-fields select[multiple] {
            min-height: 154px;
        }

        .sa-role-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .sa-role-badge {
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.72rem;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #e0f2fe;
            color: #0369a1;
        }

        .sa-role-teacher {
            background: #ecfdf5;
            color: #047857;
        }

        .sa-role-parent {
            background: #fef3c7;
            color: #92400e;
        }

        .sa-role-schoolAdmin,
        .sa-role-regionalAdmin {
            background: #ede9fe;
            color: #6d28d9;
        }

        .sa-role-ministryUser {
            background: #cffafe;
            color: #0e7490;
        }

        .sa-role-platformAdmin,
        .sa-role-superAdmin {
            background: #fee2e2;
            color: #b91c1c;
        }

        .sa-role-empty {
            background: #f1f5f9;
            color: #64748b;
        }

        .sa-btn-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.55);
            border-top-color: white;
            border-radius: 50%;
            animation: saSpin 0.8s linear infinite;
        }

        .sa-btn-secondary .sa-btn-spinner {
            border-color: rgba(29,78,216,0.25);
            border-top-color: var(--blue);
        }

        .sa-skeleton-stack,
        .sa-location-skeleton {
            display: grid;
            gap: 10px;
        }

        .sa-skeleton-stack span,
        .sa-location-skeleton span,
        .sa-location-skeleton i {
            display: block;
            border-radius: 14px;
            background: linear-gradient(90deg, #e2e8f0 0%, #f8fafc 50%, #e2e8f0 100%);
            background-size: 220% 100%;
            animation: saShimmer 1.2s ease-in-out infinite;
        }

        .sa-skeleton-stack span {
            height: 18px;
        }

        .sa-location-skeleton {
            grid-template-columns: 76px 1fr;
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 16px;
            background: white;
        }

        .sa-location-skeleton span {
            height: 76px;
            border-radius: 18px;
        }

        .sa-location-skeleton i {
            height: 18px;
        }

        .sa-location-skeleton i:nth-child(1) {
            width: 55%;
        }

        .sa-location-skeleton i:nth-child(2) {
            width: 76%;
        }

        .sa-location-skeleton i:nth-child(3) {
            width: 38%;
        }

        .sa-row,
        .sa-student-card,
        .sa-assignment-row {
            border: 1px solid var(--line);
            border-radius: 22px;
            background: #fbfdff;
            padding: 14px;
        }

        .sa-assignment-row {
            display: grid;
            grid-template-columns: 1.3fr 1.2fr 0.8fr auto;
            gap: 14px;
            align-items: center;
        }

        .sa-assignment-row small,
        .sa-assignment-row strong {
            display: block;
        }

        .sa-assignment-row small {
            color: var(--muted);
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .sa-row-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .sa-pill,
        .sa-status {
            display: inline-flex;
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .sa-pill {
            background: #e0f2fe;
            color: #0369a1;
        }

        .sa-status {
            background: #ecfdf5;
            color: var(--green);
        }

        .sa-status-paused {
            background: #fff7ed;
            color: #c2410c;
        }

        .sa-status-inactive,
        .sa-status-suspended {
            background: #fff7ed;
            color: #c2410c;
        }

        .sa-status-archived {
            background: #f1f5f9;
            color: #475569;
        }

        .sa-student-card {
            display: grid;
            gap: 12px;
        }

        .sa-student-head {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .sa-student-head small {
            display: block;
            color: var(--muted);
            font-weight: 800;
        }

        .sa-avatar {
            width: 58px;
            height: 58px;
            border-radius: 20px;
            object-fit: cover;
        }

        .sa-avatar-fallback {
            background: #dbeafe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }

        .sa-fruit-panel {
            margin-top: 14px;
            border: 1px dashed var(--line);
            border-radius: 20px;
            padding: 14px;
            background: var(--sand);
        }

        .sa-fruit-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 10px 0;
        }

        .sa-fruit-slots span {
            min-height: 48px;
            border: 1px dashed #cbd5e1;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            font-size: 1.5rem;
        }

        .sa-fruit-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .sa-fruit-btn {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: white;
            padding: 10px 0;
            font-size: 1.45rem;
            cursor: pointer;
        }

        .sa-message {
            border-radius: 18px;
            padding: 12px 14px;
            font-weight: 900;
            margin-bottom: 16px;
        }

        .sa-message-info {
            background: #eff6ff;
            color: var(--blue);
        }

        .sa-message-success {
            background: #ecfdf5;
            color: var(--green);
        }

        .sa-message-error {
            background: #fef2f2;
            color: var(--red);
        }

        .sa-empty {
            border: 1px dashed var(--line);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            background: #f8fafc;
            display: grid;
            gap: 6px;
        }

        .sa-login-link-preview {
            grid-column: 1 / -1;
            border: 1px dashed #bfdbfe;
            border-radius: 18px;
            background: #eff6ff;
            color: var(--blue);
            padding: 12px;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            font-weight: 900;
        }

        .sa-login-link-preview span {
            overflow-wrap: anywhere;
            color: var(--ink);
        }

        .sa-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.52);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .sa-modal {
            width: min(560px, 100%);
            background: white;
            border-radius: 30px;
            padding: 24px;
            box-shadow: 0 30px 90px rgba(0,0,0,0.24);
        }

        .sa-modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .sa-access-card,
        .sa-loading {
            max-width: 620px;
            margin: 80px auto;
            padding: 30px;
            text-align: center;
        }

        .sa-spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #dbeafe;
            border-top-color: var(--blue);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: saSpin 0.9s linear infinite;
        }

        @keyframes saSpin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes saShimmer {
            to {
                background-position: -220% 0;
            }
        }

        @media (max-width: 1050px) {
            .sa-shell,
            .sa-grid-3,
            .sa-grid-4,
            .sa-form-5,
            .sa-form-6,
            .sa-form-assignment,
            .sa-form-student,
            .sa-filters,
            .sa-assignment-row,
            .sa-location-summary,
            .sa-location-fields,
            .sa-overview-grid-2,
            .sa-overview-skeleton,
            .sa-quick-actions,
            .sa-mini-grid,
            .sa-search-groups,
            .sa-user-filters,
            .sa-user-summary,
            .sa-user-fields {
                grid-template-columns: 1fr;
            }

            .sa-page-head,
            .sa-section-title,
            .sa-overview-head {
                flex-direction: column;
            }

            .sa-field-wide {
                grid-column: auto;
            }

            .sa-action-item,
            .sa-health-row,
            .sa-feed-row,
            .sa-roadmap-row,
            .sa-check-row {
                grid-template-columns: 1fr;
            }

            .sa-health-row strong {
                text-align: left;
            }

            .sa-sidebar {
                position: static;
            }

            .sa-topbar {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>

    </header>
    <main id="app">
        <h1>Core System Configuration</h1>
        <p>Managing the heart of the national educational engine...</p>
    </main>
