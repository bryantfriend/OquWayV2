<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OquWay Student Login</title>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js",
        "firebase/functions": "https://www.gstatic.com/firebasejs/10.11.1/firebase-functions.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.11.1/firebase-storage.js"
      }
    }
  </script>
  <style>
    :root {
      --ink: #132238;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #059669;
      --line: #dbe5f2;
      --paper: #ffffff;
      --soft: #f7fbff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, rgba(37,99,235,0.18), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(5,150,105,0.18), transparent 28%),
        linear-gradient(135deg, #f7fbff 0%, #edf7f3 55%, #fff8ed 100%);
    }

    button,
    input,
    select {
      font-family: inherit;
    }

    .login-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 44px;
    }

    .login-hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: center;
      margin-bottom: 22px;
    }

    .login-hero h1 {
      margin: 0;
      font-size: clamp(2.3rem, 6vw, 5rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
    }

    .login-hero p {
      color: var(--muted);
      font-weight: 700;
      line-height: 1.6;
      max-width: 520px;
    }

    .login-card {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(219,229,242,0.95);
      border-radius: 30px;
      box-shadow: 0 24px 80px rgba(19,34,56,0.12);
      padding: 24px;
    }

    .login-grid {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
    }

    .login-panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
    }

    .login-panel h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .login-select,
    .login-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 12px 13px;
      font-size: 1rem;
      margin-bottom: 12px;
      background: #fff;
    }

    .login-mode-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .login-mode-tab,
    .login-primary-btn,
    .fruit-btn,
    .location-card,
    .student-card,
    .login-small-btn {
      border: 0;
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }

    .login-mode-tab {
      border-radius: 999px;
      padding: 10px 14px;
      background: #eff6ff;
      color: var(--blue);
      border: 1px solid #bfdbfe;
    }

    .login-mode-tab-active {
      background: var(--blue);
      color: #fff;
    }

    .login-primary-btn {
      width: 100%;
      border-radius: 17px;
      padding: 13px 16px;
      background: var(--green);
      color: white;
      box-shadow: 0 14px 30px rgba(5,150,105,0.22);
    }

    .login-primary-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .location-list,
    .class-list,
    .student-list {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .location-list {
      grid-template-columns: 1fr;
    }

    .class-list,
    .student-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .location-card,
    .class-btn,
    .student-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 12px;
      text-align: left;
    }

    .location-card-active,
    .class-btn-active,
    .student-card-active {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .location-direct-card {
      display: grid;
      gap: 6px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: var(--blue);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 16px;
      font-weight: 900;
    }

    .location-direct-card span {
      color: var(--muted);
      font-size: 0.86rem;
      overflow-wrap: anywhere;
    }

    .student-card img,
    .default-avatar {
      width: 62px;
      height: 62px;
      border-radius: 22px;
      object-fit: cover;
      background: #e0f2fe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .fruit-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 9px;
      margin: 12px 0;
    }

    .fruit-btn {
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 1.8rem;
      padding: 12px 0;
    }

    .fruit-entry {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }

    .fruit-slot {
      flex: 1;
      min-height: 48px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .login-small-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .login-small-btn {
      flex: 1;
      border-radius: 13px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
    }

    .login-message {
      border-radius: 17px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 12px 14px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .login-message-error {
      border-color: #fecaca;
      background: #fef2f2;
      color: #dc2626;
    }

    .login-empty {
      border: 1px dashed var(--line);
      background: #f8fafc;
      color: var(--muted);
      border-radius: 20px;
      padding: 22px;
      text-align: center;
      font-weight: 800;
    }

    @media (max-width: 820px) {
      .login-grid,
      .location-list,
      .class-list,
      .student-list {
        grid-template-columns: 1fr;
      }

      .login-hero {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main id="app" class="login-shell">
    <section class="login-hero">
      <div>
        <h1>OquWay Login</h1>
        <p>Loading the student access portal...</p>
      </div>
      <div class="login-card"><strong>Student Login</strong></div>
    </section>
  </main>
  <script type="module" src="./src/main.js?v=1.1.97-student-session-uid"></script>
</body>

</html>
