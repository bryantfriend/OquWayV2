<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Course Creator - Phase A Catalog</title>
  <!-- Prevent Live Preview 404 hang for favicon -->
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .builder-shell {
      background:
        radial-gradient(circle at 10% 0%, rgba(37,99,235,0.12), transparent 30%),
        linear-gradient(135deg, #f8fbff 0%, #f0fdf4 58%, #fff7ed 100%);
      color: #172033;
    }

    .course-builder-boot {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at 16% 18%, rgba(37, 99, 235, 0.18), transparent 30%),
        radial-gradient(circle at 86% 20%, rgba(16, 185, 129, 0.16), transparent 28%),
        linear-gradient(135deg, #f8fbff 0%, #ecfdf5 58%, #fff7ed 100%);
    }

    .course-builder-boot-card {
      width: min(520px, 100%);
      display: grid;
      justify-items: center;
      gap: 12px;
      padding: 34px;
      border: 1px solid rgba(219, 229, 242, 0.95);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 28px 90px rgba(23, 32, 51, 0.14);
      text-align: center;
    }

    .course-builder-boot-orbit {
      position: relative;
      width: 84px;
      height: 84px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #eff6ff, #ecfdf5);
      box-shadow: inset 0 0 0 1px #dbeafe;
    }

    .course-builder-boot-orbit::before {
      content: "";
      position: absolute;
      inset: -7px;
      border: 4px solid rgba(37, 99, 235, 0.14);
      border-top-color: #2563eb;
      border-right-color: #10b981;
      border-radius: 50%;
      animation: courseBuilderBootSpin 1.1s linear infinite;
    }

    .course-builder-boot-orbit span {
      position: relative;
      z-index: 1;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: #2563eb;
      background: white;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.16);
      animation: courseBuilderBootFloat 1.8s ease-in-out infinite;
    }

    .course-builder-boot-card p {
      margin: 10px 0 0;
      color: #059669;
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .course-builder-boot-card h1 {
      margin: 0;
      color: #172033;
      font-size: clamp(1.7rem, 5vw, 2.6rem);
      line-height: 1.08;
    }

    .course-builder-boot-card small {
      max-width: 360px;
      color: #64748b;
      font-size: 0.95rem;
      font-weight: 750;
      line-height: 1.5;
    }

    .course-builder-boot-card button {
      margin-top: 10px;
      border: 0;
      border-radius: 14px;
      padding: 11px 18px;
      color: white;
      background: #2563eb;
      font-weight: 900;
      cursor: pointer;
    }

    .course-builder-boot-steps {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .course-builder-boot-steps span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #2563eb;
      animation: courseBuilderBootPulse 1.2s ease-in-out infinite;
    }

    .course-builder-boot-steps span:nth-child(2) {
      background: #10b981;
      animation-delay: 0.15s;
    }

    .course-builder-boot-steps span:nth-child(3) {
      background: #f97316;
      animation-delay: 0.3s;
    }

    .course-builder-boot-error .course-builder-boot-orbit::before {
      border-top-color: #f97316;
      border-right-color: #dc2626;
    }

    @keyframes courseBuilderBootSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes courseBuilderBootFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes courseBuilderBootPulse {
      0%, 100% { transform: translateY(0); opacity: 0.45; }
      50% { transform: translateY(-4px); opacity: 1; }
    }

    .builder-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid rgba(219,229,242,0.9);
      box-shadow: 0 12px 40px rgba(23,32,51,0.06);
      backdrop-filter: blur(14px);
    }

    .builder-brand {
      display: grid;
      gap: 0.1rem;
    }

    .builder-brand span {
      color: #2563eb;
      font-size: 1.45rem;
      font-weight: 900;
    }

    .builder-brand small,
    .builder-eyebrow {
      color: #059669;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .builder-main {
      width: min(1240px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    .builder-hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(219,229,242,0.95);
      border-radius: 32px;
      box-shadow: 0 22px 60px rgba(23,32,51,0.10);
      padding: 1.4rem;
      overflow: hidden;
    }

    .builder-hero h1 {
      margin: 0.2rem 0;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .builder-hero p {
      max-width: 680px;
      margin: 0;
      color: #64748b;
      font-weight: 650;
      line-height: 1.6;
    }

    .builder-hero img {
      width: min(300px, 32vw);
      flex: 0 0 auto;
    }

    .builder-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1rem 0;
    }

    .builder-search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: rgba(255,255,255,0.86);
      border: 1px solid #dbe5f2;
      border-radius: 18px;
      padding: 0 1rem;
      min-height: 48px;
    }

    .builder-search input,
    .builder-select,
    .builder-form-grid input,
    .builder-form-grid textarea,
    .builder-form-grid select {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #172033;
      font-weight: 750;
    }

    .builder-select {
      width: 180px;
      min-height: 48px;
      background: rgba(255,255,255,0.86);
      border: 1px solid #dbe5f2;
      border-radius: 18px;
      padding: 0 0.8rem;
    }

    .builder-nav-actions,
    .builder-card-actions,
    .builder-modal-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.55rem;
    }

    .builder-user-area {
      display: grid;
      gap: 0.05rem;
      max-width: 220px;
      border: 1px solid #dbe5f2;
      border-radius: 16px;
      background: #fff;
      padding: 0.48rem 0.75rem;
      color: #172033;
      box-shadow: 0 8px 24px rgba(23,32,51,0.06);
      cursor: pointer;
      text-align: left;
    }

    .builder-user-area:hover,
    .builder-user-area:focus-visible {
      border-color: #93c5fd;
      outline: none;
      box-shadow: 0 10px 28px rgba(37,99,235,0.14);
    }

    .builder-user-area span,
    .builder-user-area small {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .builder-user-area span {
      font-size: 0.78rem;
      font-weight: 900;
    }

    .builder-user-area small {
      color: #64748b;
      font-size: 0.66rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .builder-profile-view {
      display: grid;
      gap: 1rem;
    }

    .builder-profile-card {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 1rem;
      align-items: start;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 1rem;
      background: #f8fafc;
    }

    .builder-profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      border: 1px solid #dbe5f2;
      background: #fff;
    }

    .builder-profile-avatar-fallback {
      display: grid;
      place-items: center;
      color: #1d4ed8;
      font-weight: 950;
      background: #eff6ff;
    }

    .builder-profile-fields {
      display: grid;
      gap: 0.7rem;
      min-width: 0;
    }

    .builder-profile-fields label {
      display: grid;
      gap: 0.25rem;
      color: #64748b;
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .builder-profile-fields span {
      color: #0f172a;
      font-size: 0.86rem;
      font-weight: 800;
      text-transform: none;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .builder-profile-note {
      margin: 0;
      color: #475569;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.5;
    }

    .builder-btn,
    .builder-card-actions button,
    .builder-icon-btn {
      border: 0;
      border-radius: 999px;
      padding: 0.78rem 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }

    .builder-btn:hover,
    .builder-card-actions button:hover,
    .builder-icon-btn:hover {
      transform: translateY(-1px);
    }

    .builder-btn-primary,
    .builder-card-actions button:nth-child(3),
    .builder-card-actions button:nth-child(4) {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 12px 28px rgba(37,99,235,0.20);
    }

    .builder-btn-ghost,
    .builder-card-actions button,
    .builder-icon-btn {
      background: #fff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }

    .builder-course-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .builder-course-card {
      position: relative;
      display: grid;
      gap: 0.85rem;
      min-height: 330px;
      background: linear-gradient(145deg, #fff 0%, #f8fbff 58%, #ecfdf5 100%);
      border: 1px solid rgba(148,163,184,0.34);
      border-radius: 28px;
      box-shadow: 0 18px 44px rgba(23,32,51,0.08);
      padding: 1rem;
    }

    .builder-course-card-archiving {
      border-color: rgba(37,99,235,0.34);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.08), 0 18px 44px rgba(23,32,51,0.08);
    }

    .builder-archive-overlay {
      position: absolute;
      inset: 0.75rem;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      border-radius: 22px;
      background: rgba(255,255,255,0.84);
      color: #2563eb;
      font-size: 0.86rem;
      font-weight: 900;
      backdrop-filter: blur(5px);
      pointer-events: none;
      animation: builderArchivePulse 1s ease-in-out infinite alternate;
    }

    .builder-archive-btn-pending {
      background: #eff6ff !important;
      color: #2563eb !important;
      border-color: #bfdbfe !important;
    }

    .builder-btn:disabled,
    .builder-card-actions button:disabled,
    .builder-icon-btn:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    @keyframes builderArchivePulse {
      from { opacity: 0.86; }
      to { opacity: 1; }
    }

    .editor-tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #64748b;
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 900;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .editor-tab-btn:hover {
      transform: translateY(-1px);
      border-color: #a7f3d0;
      background: #f0fdfa;
      color: #047857;
    }

    .editor-tab-btn.oqu-editor-tab-active {
      border-color: #34d399;
      background: linear-gradient(135deg, #ecfdf5 0%, #eff6ff 100%);
      color: #065f46;
      box-shadow: 0 10px 24px rgba(16, 185, 129, 0.14);
    }

    .builder-course-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .builder-course-card-top img {
      width: 104px;
      height: 86px;
      object-fit: contain;
    }

    .builder-course-card-icon {
      display: grid;
      place-items: center;
      width: 86px;
      height: 86px;
      overflow: hidden;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 1.65rem;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .builder-course-card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .builder-course-card h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .builder-course-card p {
      margin: 0;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 650;
      line-height: 1.5;
    }

    .builder-course-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .builder-course-meta span,
    .builder-badge {
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      padding: 0.38rem 0.58rem;
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .builder-badge-published {
      background: #dcfce7;
      color: #047857;
    }

    .builder-badge-archived {
      background: #f1f5f9;
      color: #64748b;
    }

    .builder-course-meta .builder-count-source {
      background: #fff7ed;
      color: #c2410c;
    }

    .builder-status {
      border-radius: 18px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      font-weight: 900;
    }

    .builder-status-loading {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }

    .builder-status-success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #bbf7d0;
    }

    .builder-status-error,
    .builder-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .builder-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,0.70);
      padding: 1rem;
    }

    .builder-modal.hidden {
      display: none;
    }

    .builder-modal-panel {
      width: min(720px, 100%);
      max-height: min(86vh, 820px);
      overflow: auto;
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 30px 80px rgba(15,23,42,0.24);
      padding: 1.2rem;
    }

    .builder-modal-panel-wide {
      width: min(980px, 100%);
    }

    .builder-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .builder-modal-head h2 {
      margin: 0.15rem 0 0;
      font-size: 1.6rem;
      font-weight: 900;
    }

    .builder-archive-list {
      display: grid;
      gap: 0.85rem;
      margin: 0.5rem 0 1rem;
    }

    .builder-archive-reloading {
      display: grid;
      gap: 0.85rem;
    }

    .builder-archive-reloading > div {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      color: #1d4ed8;
      padding: 1rem;
      box-shadow: 0 16px 36px rgba(37,99,235,0.12);
      animation: builderArchiveReloadPulse 0.9s ease-in-out infinite alternate;
    }

    .builder-archive-reloading strong,
    .builder-archive-reloading small {
      display: block;
    }

    .builder-archive-reloading strong {
      font-weight: 950;
    }

    .builder-archive-reloading small {
      color: #64748b;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .builder-archive-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 1rem;
      align-items: center;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: #f8fafc;
      padding: 1rem;
    }

    .builder-archive-row h3 {
      margin: 0.55rem 0 0.3rem;
      font-size: 1rem;
      font-weight: 900;
      color: #172033;
    }

    .builder-archive-row p {
      margin: 0 0 0.7rem;
      color: #64748b;
      font-size: 0.86rem;
      font-weight: 650;
      line-height: 1.45;
    }

    .builder-archive-row-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.55rem;
      min-width: 260px;
    }

    .builder-archive-row-actions button {
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      background: #fff;
      color: #2563eb;
      padding: 0.72rem 0.9rem;
      font-weight: 900;
      cursor: pointer;
    }

    .builder-archive-row-actions .builder-danger-btn {
      border-color: #fecaca;
      background: #fef2f2;
      color: #dc2626;
    }

    .builder-archive-row-actions button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
    }

    .builder-archive-empty {
      min-height: 260px;
    }

    @keyframes builderArchiveReloadPulse {
      from {
        opacity: 0.82;
        transform: translateY(0);
      }
      to {
        opacity: 1;
        transform: translateY(-1px);
      }
    }

    .builder-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem;
    }

    .builder-form-grid label {
      display: grid;
      gap: 0.35rem;
      color: #64748b;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .builder-form-grid input,
    .builder-form-grid textarea,
    .builder-form-grid select {
      min-height: 46px;
      border: 1px solid #dbe5f2;
      border-radius: 16px;
      padding: 0.65rem 0.8rem;
      text-transform: none;
    }

    .builder-form-grid textarea {
      min-height: 96px;
      resize: vertical;
    }

    .builder-field-wide {
      grid-column: 1 / -1;
    }

    .builder-empty {
      grid-column: 1 / -1;
      text-align: center;
      background: rgba(255,255,255,0.86);
      border: 1px dashed #cbd5e1;
      border-radius: 30px;
      padding: 2.5rem 1rem;
    }

    .builder-empty img {
      width: min(280px, 80%);
      margin: 0 auto 1rem;
    }

    .builder-skeleton div,
    .builder-skeleton span,
    .builder-skeleton p {
      border-radius: 14px;
      background: linear-gradient(90deg, #f1f5f9, #e2e8f0, #f1f5f9);
      min-height: 20px;
    }

    @media (max-width: 980px) {
      .builder-course-grid,
      .builder-form-grid {
        grid-template-columns: 1fr;
      }

      .builder-archive-row {
        grid-template-columns: 1fr;
      }

      .builder-archive-row-actions {
        justify-content: flex-start;
        min-width: 0;
      }

      .builder-hero,
      .builder-toolbar,
      .builder-nav {
        align-items: stretch;
        flex-direction: column;
      }

      .builder-select {
        width: 100%;
      }
    }

    /* ── ICF Creation / Loading Feedback ───────────────────────── */

    @keyframes oquSpinCw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes oquSkeletonShimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    @keyframes oquSuccessScale {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    .oqu-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: oquSpinCw 0.65s linear infinite;
      vertical-align: middle;
    }

    .oqu-spinner-blue {
      border-color: rgba(59,130,246,0.25);
      border-top-color: #3b82f6;
    }

    .oqu-skeleton-line {
      border-radius: 6px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 37%, #f0f0f0 63%);
      background-size: 400px 100%;
      animation: oquSkeletonShimmer 1.4s ease infinite;
    }

    .oqu-skeleton-card {
      border-radius: 10px;
      background: linear-gradient(90deg, #f4f4f4 25%, #eaeaea 37%, #f4f4f4 63%);
      background-size: 400px 100%;
      animation: oquSkeletonShimmer 1.4s ease infinite;
    }

    .oqu-success-icon {
      display: inline-block;
      animation: oquSuccessScale 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes moduleWizardCardBuild {
      0% { transform: translateY(22px) scale(0.92); opacity: 0; }
      45% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-4px) scale(1); opacity: 1; }
    }

    @keyframes moduleWizardDotConnect {
      0%, 15% { transform: scale(0.55); opacity: 0.35; }
      45%, 100% { transform: scale(1); opacity: 1; }
    }

    @keyframes moduleWizardProgressPulse {
      0% { transform: scaleX(0.2); opacity: 0.35; }
      55% { transform: scaleX(1); opacity: 1; }
      100% { transform: scaleX(1); opacity: 0.55; }
    }

    .module-wizard-loading-card {
      width: min(520px, 100%);
      border: 1px solid #dbeafe;
      border-radius: 24px;
      background:
        radial-gradient(circle at 18% 12%, rgba(16,185,129,0.16), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #eff6ff 55%, #ecfdf5 100%);
      box-shadow: 0 26px 70px rgba(15,23,42,0.16);
      padding: 32px;
      text-align: center;
    }

    .module-wizard-stage {
      position: relative;
      width: 250px;
      height: 150px;
      margin: 0 auto 24px;
    }

    .module-wizard-stage::before {
      content: "";
      position: absolute;
      left: 38px;
      right: 38px;
      top: 76px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      transform-origin: left center;
      animation: moduleWizardProgressPulse 1.8s ease-in-out infinite;
    }

    .module-wizard-path-dot {
      position: absolute;
      top: 66px;
      width: 22px;
      height: 22px;
      border: 4px solid #ffffff;
      border-radius: 999px;
      background: #2563eb;
      box-shadow: 0 10px 22px rgba(37,99,235,0.22);
      animation: moduleWizardDotConnect 1.8s ease-in-out infinite;
    }

    .module-wizard-path-dot-one { left: 26px; animation-delay: 0s; }
    .module-wizard-path-dot-two { left: 113px; background: #0ea5e9; animation-delay: 0.25s; }
    .module-wizard-path-dot-three { right: 26px; background: #10b981; animation-delay: 0.5s; }

    .module-wizard-card-stack {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
    }

    .module-wizard-mini-card {
      display: grid;
      align-content: center;
      gap: 9px;
      width: 64px;
      height: 86px;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 16px 34px rgba(15,23,42,0.10);
      color: #2563eb;
      opacity: 0;
      animation: moduleWizardCardBuild 1.8s ease-in-out infinite;
    }

    .module-wizard-mini-card i {
      font-size: 20px;
    }

    .module-wizard-mini-card span {
      width: 34px;
      height: 5px;
      margin: 0 auto;
      border-radius: 999px;
      background: #bfdbfe;
    }

    .module-wizard-mini-card-one { animation-delay: 0s; }
    .module-wizard-mini-card-two { height: 104px; color: #0ea5e9; animation-delay: 0.25s; }
    .module-wizard-mini-card-three { color: #10b981; animation-delay: 0.5s; }

    .module-wizard-progress-step {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      transform-origin: left center;
      animation: moduleWizardProgressPulse 1.55s ease-in-out infinite;
    }

    .module-wizard-progress-step:nth-child(2) { animation-delay: 0.15s; }
    .module-wizard-progress-step:nth-child(3) { animation-delay: 0.3s; }
    .module-wizard-progress-step:nth-child(4) { animation-delay: 0.45s; }

    .module-wizard-success-card {
      border-color: #bbf7d0;
      background: linear-gradient(135deg, #ffffff 0%, #ecfdf5 100%);
    }

    .module-wizard-success-icon,
    .module-wizard-error-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 74px;
      height: 74px;
      margin-bottom: 18px;
      border-radius: 24px;
      font-size: 30px;
      animation: oquSuccessScale 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .module-wizard-success-icon {
      background: #dcfce7;
      color: #15803d;
    }

    .module-wizard-error-card {
      border-color: #fecaca;
      background: linear-gradient(135deg, #ffffff 0%, #fff7ed 100%);
    }

    .module-wizard-error-icon {
      background: #fef2f2;
      color: #dc2626;
    }

    .oqu-status-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .oqu-status-creating {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }

    .oqu-status-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .oqu-status-success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .oqu-btn-pending {
      opacity: 0.75;
      cursor: not-allowed !important;
      pointer-events: none;
    }

    /* ── Status Pills ─────────────────────────────────────────────── */

    .oqu-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .oqu-pill-shell   { background: #f3f4f6; color: #6b7280; }
    .oqu-pill-draft   { background: #fef3c7; color: #b45309; }
    .oqu-pill-ready   { background: #dbeafe; color: #1d4ed8; }
    .oqu-pill-active  { background: #dcfce7; color: #15803d; }
    .oqu-pill-disabled{ background: #f1f5f9; color: #94a3b8; }
    .oqu-pill-archived{ background: #1e293b; color: #94a3b8; }

    /* ── Accordion ────────────────────────────────────────────────── */

    .oqu-accordion-body {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.22s ease;
    }

    .oqu-accordion-body.oqu-accordion-open {
      max-height: 4000px;
      opacity: 1;
      transition: max-height 0.42s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.28s ease;
    }

    .oqu-accordion-chevron {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-block;
    }

    .oqu-accordion-header.oqu-accordion-header-open .oqu-accordion-chevron {
      transform: rotate(90deg);
    }

    .oqu-accordion-header {
      display: flex;
      align-items: center;
      width: 100%;
      text-align: left;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 12px 16px;
      gap: 10px;
      border-radius: 10px;
      transition: background 0.15s ease;
    }

    .oqu-accordion-header:hover {
      background: #f9fafb;
    }

    .oqu-accordion-header.oqu-accordion-header-open {
      background: #eff6ff;
    }

    /* ── Progress Bar ─────────────────────────────────────────────── */

    .oqu-progress-track {
      flex-shrink: 0;
      width: 56px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
    }

    .oqu-progress-fill {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      transition: width 0.4s ease;
    }

    .oqu-progress-fill.oqu-progress-done {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }

    /* ── Step Type Picker ─────────────────────────────────────────── */

    .oqu-step-picker {
      display: none;
      border: 1px solid #e0e7ff;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(59,130,246,0.10);
      margin-top: 4px;
    }

    .oqu-step-picker-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: background 0.12s ease;
    }

    .oqu-step-picker-option:hover {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .oqu-step-picker-option + .oqu-step-picker-option {
      border-top: 1px solid #f3f4f6;
    }

    /* ── Property Grid ────────────────────────────────────────────── */

    .oqu-prop-section-label {
      font-size: 9px;
      font-weight: 800;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .oqu-prop-section-label:first-child {
      margin-top: 0;
    }

    .oqu-prop-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .oqu-prop-row:last-child {
      border-bottom: none;
    }

    .oqu-prop-label {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .oqu-prop-value {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      line-height: 1.4;
    }

    .oqu-prop-value-muted {
      font-size: 12px;
      color: #6b7280;
    }

    /* ── Workspace Sticky Header ──────────────────────────────────── */

    .oqu-workspace-sticky {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    /* ── Course structure sidebar ────────────────────────────────── */

    .course-structure-sidebar {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(15, 23, 42, 0.05);
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .course-structure-topbar {
      padding: 14px 14px 10px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }

    .course-structure-section {
      padding: 10px;
      border-bottom: 1px solid #f1f5f9;
      min-width: 0;
    }

    .course-structure-section-paths {
      flex-shrink: 0;
    }

    .course-structure-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
      margin-bottom: 8px;
    }

    .course-structure-section-title {
      color: #334155;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .course-structure-section-subtitle {
      color: #94a3b8;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.2;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .course-structure-add-path-btn,
    .course-structure-add-step-btn {
      border: 1px solid #bfdbfe;
      background: #f8fbff;
      color: #1d4ed8;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      padding: 6px 8px;
      transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease, transform 0.14s ease;
    }

    .course-structure-add-path-btn:hover,
    .course-structure-add-step-btn:hover {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1e40af;
      transform: translateY(-1px);
    }

    .course-structure-path-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 170px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .course-path-card {
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 8px;
      position: relative;
      transition: background 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }

    .course-path-card:hover {
      background: #f8fafc;
      border-color: #bae6fd;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.05);
    }

    .course-path-card.is-selected {
      background: #f0fdf9;
      border-color: #5eead4;
      box-shadow: inset 3px 0 0 #14b8a6, 0 3px 10px rgba(15, 118, 110, 0.08);
    }

    .course-path-card.is-loading {
      cursor: default;
    }

    .course-path-icon {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      color: #0f766e;
      background: #ccfbf1;
    }

    .course-path-icon-review {
      color: #0369a1;
      background: #e0f2fe;
    }

    .course-path-icon-challenge {
      color: #6d28d9;
      background: #ede9fe;
    }

    .course-path-icon-support {
      color: #a16207;
      background: #fef3c7;
    }

    .course-path-icon-custom {
      color: #475569;
      background: #f1f5f9;
    }

    .course-path-card-copy {
      min-width: 0;
      flex: 1;
    }

    .course-path-card-title,
    .current-path-title,
    .structure-step-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .course-path-card-title {
      color: #0f172a;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .course-path-card-meta,
    .current-path-badges,
    .structure-step-badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 5px;
      min-width: 0;
    }

    .structure-mini-badge {
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      background: #f8fafc;
      color: #64748b;
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      padding: 2px 6px;
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1.15;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .structure-mini-badge-draft,
    .structure-mini-badge-shell {
      border-color: #fde68a;
      background: #fffbeb;
      color: #92400e;
    }

    .structure-mini-badge-ready {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .structure-mini-badge-active,
    .structure-mini-badge-published,
    .structure-mini-badge-required {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #047857;
    }

    .structure-mini-badge-disabled,
    .structure-mini-badge-archived {
      border-color: #e5e7eb;
      background: #f8fafc;
      color: #64748b;
    }

    .course-structure-details {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 10px;
    }

    .course-structure-details-inner {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      height: 100%;
    }

    .course-structure-details-inner .course-structure-section {
      border: 0;
      padding: 0;
    }

    .current-path-card {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
      padding: 9px;
    }

    .current-path-copy {
      min-width: 0;
      flex: 1;
    }

    .current-path-title {
      color: #0f172a;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
    }

    .current-path-meta {
      color: #64748b;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.25;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .current-path-badges {
      justify-content: flex-end;
      margin-top: 0;
      max-width: 82px;
    }

    .course-structure-steps-section {
      display: flex;
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }

    .course-structure-empty-card,
    .course-structure-idle-card {
      border: 1px dashed #cbd5e1;
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }

    .course-structure-idle {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      padding: 26px 10px;
      text-align: center;
    }

    .course-structure-empty-title {
      color: #475569;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 4px;
    }

    .course-structure-empty-copy {
      color: #94a3b8;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.45;
    }

    .course-structure-footer {
      background: #f8fafc;
      border-top: 1px solid #f1f5f9;
      flex-shrink: 0;
      padding: 9px 14px;
    }

    .course-structure-count {
      color: #94a3b8;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Preview Box ──────────────────────────────────────────────── */

    .pm-preview-box {
      cursor: pointer;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      text-align: left;
    }

    .pm-preview-box:hover {
      border-color: #93c5fd;
      box-shadow: 0 2px 8px rgba(59,130,246,0.10);
      background: #f8fbff;
    }

    .pm-preview-box.pm-preview-box-active {
      border-color: #3b82f6;
      background: #eff6ff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    /* ── Step navigation tiles ────────────────────────────────────── */

    .oqu-step-tile {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
      text-align: left;
      width: 100%;
    }

    .oqu-step-order-number {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border-radius: 9999px;
      background: #f3f4f6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      color: #6b7280;
    }

    .oqu-step-tile:hover {
      border-color: #93c5fd;
      background: #f8fbff;
    }

    .oqu-step-tile.oqu-step-tile-active {
      border-color: #3b82f6;
      background: #eff6ff;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.14);
    }

    .oqu-step-tile-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .oqu-step-icon-btn {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #6b7280;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .oqu-step-icon-btn:hover:not(:disabled) {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .oqu-step-icon-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .oqu-step-delete-btn {
      border: 1px solid #fee2e2;
      background: #fff7f7;
      color: #dc2626;
      border-radius: 7px;
      padding: 4px 7px;
      font-size: 9px;
      font-weight: 900;
      transition: background 0.12s ease;
    }

    .oqu-step-delete-btn:hover {
      background: #fee2e2;
    }

    .oqu-step-preview-btn {
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      color: #047857;
      border-radius: 7px;
      padding: 4px 8px;
      font-size: 9px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .oqu-step-preview-btn:hover {
      background: #dcfce7;
      border-color: #86efac;
      transform: translateY(-1px);
    }

    .main-path-step-list {
      position: relative;
      border-radius: 10px;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow-y: auto;
      padding: 1px 2px 2px 0;
      transition: background 0.12s ease, box-shadow 0.12s ease;
    }

    .main-path-step-list.is-drop-active {
      background: rgba(14, 165, 233, 0.05);
      box-shadow: inset 0 0 0 1px rgba(14, 165, 233, 0.12);
    }

    .main-path-step-tile {
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 18px 24px minmax(0, 1fr) 50px;
      align-items: center;
      gap: 6px;
      min-width: 0;
      padding: 7px;
      touch-action: manipulation;
      transition: background 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }

    .main-path-step-tile:hover {
      background: #f8fafc;
      border-color: #bfdbfe;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
      transform: translateY(-1px);
    }

    .main-path-step-tile.is-selected {
      background: #eff6ff;
      border-color: #93c5fd;
      box-shadow: inset 3px 0 0 #3b82f6, 0 4px 12px rgba(37, 99, 235, 0.08);
    }

    .main-path-step-tile.is-dragging {
      opacity: 0.68;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
      cursor: grabbing;
      transform: scale(0.995);
    }

    .step-drag-handle {
      width: 18px;
      height: 32px;
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(2, 3px);
      grid-auto-rows: 3px;
      gap: 4px 4px;
      align-content: center;
      justify-content: center;
      border: 1px solid transparent;
      background: transparent;
      color: #94a3b8;
      cursor: grab;
      touch-action: none;
      padding: 0;
      border-radius: 7px;
      transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
    }

    .step-drag-handle:hover,
    .step-drag-handle:focus-visible,
    .main-path-step-tile:hover .step-drag-handle {
      background: #ecfeff;
      border-color: #bae6fd;
      color: #0284c7;
      outline: none;
    }

    .step-drag-handle:active {
      cursor: grabbing;
    }

    .step-drag-handle span {
      width: 3px;
      height: 3px;
      border-radius: 9999px;
      background: currentColor;
      display: block;
    }

    .step-drop-indicator {
      height: 4px;
      border-radius: 9999px;
      background: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.16);
      margin: 1px 6px;
      pointer-events: none;
      flex-shrink: 0;
    }

    .structure-step-number {
      width: 24px;
      height: 24px;
      border-radius: 8px;

      color: #475569;

      align-items: center;
      justify-content: center;
      flex-shrink: 0;

      font-weight: 900;

    .structure-step-copy {

    .structure-step-title {

      font-weight: 850;
      line-height: 1.25;
    }

    .structure-step-meta {
      color: #64748b;

      font-weight: 700;

    .structure-step-icon-btn,

      margin: 0 0 10px;

    .oqu-student-player-header p {
      font-size: 13px;
      line-height: 1.7;
      color: #64748b;
      margin: 0;

      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.10);
      padding: 24px;
      color: #1f2937;
    }

    .oqu-player-step h2 {
      font-size: 24px;
      line-height: 1.2;
      font-weight: 900;
      color: #111827;
      margin: 0 0 12px;

    .oqu-player-step p {
      font-size: 14px;
      line-height: 1.75;
      color: #4b5563;
      margin: 0 0 16px;
    }

    .oqu-emotional-check-in-step {
      background: linear-gradient(135deg, #ffffff 0%, #f0fdfa 52%, #eff6ff 100%);
    }

    .oqu-emotional-check-in-badge {
      display: inline-flex;
      border-radius: 999px;
      background: #ecfdf5;
      color: #047857;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .oqu-emotional-check-in-moods {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .oqu-emotional-check-in-mood {
      border: 1px solid #bfdbfe;
      border-radius: 18px;
      background: #fff;
      color: #1e3a8a;
      padding: 14px 12px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .oqu-emotional-check-in-mood.is-selected {
      border-color: #34d399;
      background: #ecfdf5;
      color: #047857;
      box-shadow: 0 10px 24px rgba(16,185,129,0.16);
    }

    .oqu-emotional-check-in-activity,
    .oqu-emotional-check-in-preview {
      border-radius: 18px;
      background: #fff7ed;
      color: #c2410c;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .oqu-emotional-check-in-continue {
      border: 0;
      border-radius: 999px;
      background: #16a34a;
      color: #fff;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .oqu-emotional-check-in-continue:disabled {
      opacity: 0.54;
      cursor: not-allowed;
    }

    .oqu-external-task-step {
      background: linear-gradient(135deg, #ffffff 0%, #eff6ff 52%, #ecfdf5 100%);
    }

    .oqu-external-task-hero {
      border-radius: 20px;
      background: #0f172a;
      color: #fff;
      padding: 20px;
      margin-bottom: 16px;
    }

    .oqu-external-task-hero p {
      color: rgba(255,255,255,0.78);
      margin: 0;
    }

    .oqu-external-task-badge {
      display: inline-flex;
      border-radius: 999px;
      background: rgba(34,197,94,0.18);
      color: #bbf7d0;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .oqu-external-task-grid {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(240px,0.8fr);
      gap: 14px;
    }

    .oqu-external-task-grid section {
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: rgba(255,255,255,0.88);
      padding: 16px;
    }

    .oqu-external-task-grid h3 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .oqu-external-task-grid ul {

    .oqu-external-task-grid li {
      display: flex;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #334155;
    }

    .oqu-external-task-grid li span {
      color: #16a34a;
    }

    .oqu-external-task-dropzone {
      display: grid;
      place-items: center;
      border: 2px dashed #93c5fd;
      border-radius: 16px;
      min-height: 98px;
      background: #eff6ff;
      color: #2563eb;
      font-weight: 900;
      cursor: pointer;
    }

    .oqu-external-task-dropzone input {
      display: none;
    }

    .oqu-external-task-file-hint,
    .oqu-external-task-status {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
    }

    .oqu-external-task-note {
      width: 100%;
      min-height: 74px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      margin-top: 12px;
      padding: 12px;
      resize: vertical;
    }

    .oqu-external-task-submit {
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: #2563eb;
      color: #fff;
      font-weight: 900;
      padding: 12px;
      margin-top: 12px;
      cursor: pointer;
    }

    .oqu-external-task-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .oqu-external-task-reference {
      display: inline-flex;
      margin-bottom: 14px;
      color: #2563eb;
      font-weight: 900;
    }

    .oqu-player-image {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 18px;
      border: 1px solid #eef2ff;
      background: #f8fafc;
    }

    .oqu-player-callout {
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      color: #166534;
      border-radius: 16px;
      padding: 14px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 16px;
    }

    .oqu-player-translation {
      color: #2563eb;
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .oqu-player-audio {
      width: 100%;
      margin: 8px 0 16px;
    }

    .oqu-player-empty-media {
      border: 1px dashed #cbd5e1;
      background: #f8fafc;
      color: #94a3b8;
      border-radius: 14px;
      padding: 16px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }

    .oqu-player-details {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 16px;
      background: #f9fafb;
      font-size: 13px;
    }

    .oqu-player-timer-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .oqu-player-timer-row span,
    .oqu-player-note {
      border-radius: 9999px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 900;
    }

    .oqu-player-record-shell {
      width: 100%;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #dc2626;
      border-radius: 16px;
      padding: 14px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .oqu-player-scale {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .oqu-player-scale span {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 12px;
      padding: 12px 0;
      text-align: center;
      font-weight: 900;
    }

    .oqu-player-scale button,
    .oqu-interactive-step button {
      font: inherit;
    }

    .oqu-interactive-step {
      border: 1px solid #e5e7eb;
      background: #ffffff;
      border-radius: 12px;
      padding: clamp(16px, 3vw, 24px);
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
    }

    .oqu-interactive-head {
      margin-bottom: 16px;
    }

    .oqu-interactive-eyebrow {
      color: #059669;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .oqu-interactive-head h2 {
      margin-bottom: 8px;
    }

    .oqu-hero-intro-layout,
    .oqu-match-board {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 0.7fr);
      gap: 16px;
      align-items: stretch;
    }

    .oqu-hero-mission,
    .oqu-scenario,
    .oqu-exit-ticket {
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      border-radius: 8px;
      padding: 16px;
      display: grid;
      gap: 8px;
    }

    .oqu-hero-mission span,
    .oqu-exit-ticket span {
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .oqu-hero-image {
      width: 100%;
      min-height: 180px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }

    .oqu-hero-image-empty {
      display: grid;
      place-items: center;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 900;
    }

    .oqu-reveal-grid,
    .oqu-sort-list,
    .oqu-choice-block,
    .oqu-order-list {
      display: grid;
      gap: 12px;
    }

    .oqu-reveal-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .oqu-reveal-card,
    .oqu-sort-item,
    .oqu-choice-block button,
    .oqu-match-board button,
    .oqu-order-item {
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      color: #0f172a;
      border-radius: 8px;
      padding: 14px;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
    }

    .oqu-reveal-card {
      min-height: 132px;
      display: grid;
      gap: 9px;
    }

    .oqu-reveal-card strong {
      display: none;
      color: #059669;
    }

    .oqu-reveal-card.is-revealed {
      background: #ecfdf5;
      border-color: #86efac;
    }

    .oqu-reveal-card.is-revealed strong {
      display: block;
    }

    .oqu-sort-buckets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 13px;
    }

    .oqu-sort-buckets span,
    .oqu-choice-feedback,
    .oqu-timeline li span {
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .oqu-sort-item,
    .oqu-order-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .oqu-sort-item.is-correct,
    .oqu-choice-block button.is-correct,
    .oqu-match-board button.is-matched,
    .oqu-order-item.is-correct {
      border-color: #86efac;
      background: #ecfdf5;
    }

    .oqu-choice-block button.is-incorrect,
    .oqu-match-board button.is-incorrect {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .oqu-choice-feedback {
      display: none;
      margin-top: 4px;
      border-radius: 8px;
    }

    .oqu-choice-feedback.is-visible {
      display: block;
    }

    .oqu-timeline {
      display: grid;
      gap: 14px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .oqu-timeline li {
      border-left: 4px solid #059669;
      background: #f8fafc;
      border-radius: 8px;
      padding: 14px 16px;
      display: grid;
      gap: 8px;
    }

    .oqu-match-board > div {
      display: grid;
      gap: 10px;
    }

    .oqu-match-board button.is-selected {
      outline: 3px solid #bfdbfe;
    }

    .oqu-order-item button {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .oqu-player-complete-btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      box-shadow: none;
    }

    .oqu-player-text-response {
      width: 100%;
      min-height: 110px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      margin-bottom: 12px;
      resize: vertical;
    }

    .oqu-player-complete-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      background: #2563eb;
      color: #fff;
      padding: 13px 16px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(37,99,235,0.22);
    }

    .oqu-full-experience-step {
      position: relative;
      overflow: hidden;
      width: 100%;
      box-sizing: border-box;
    }

    .oqu-experience-kicker {
      display: inline-flex;
      border-radius: 9999px;
      background: rgba(37,99,235,0.10);
      color: #1d4ed8;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      margin-bottom: 14px;
    }

    .oqu-experience-hero,
    .oqu-cyber-mission-header,
    .oqu-island-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .oqu-experience-orb,
    .oqu-island-sun {
      width: 70px;
      height: 70px;
      flex-shrink: 0;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      background: #eff6ff;
      color: #2563eb;
    }

    .oqu-custom-experience-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
      border: 1px solid #bfdbfe;
      background: linear-gradient(135deg, #eff6ff, #f8fafc);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .oqu-experience-code,
    .oqu-cyber-code-area pre {
      white-space: pre-wrap;
      background: #0f172a;
      color: #bfdbfe;
      border-radius: 16px;
      padding: 14px;
      font-size: 12px;
      overflow-x: auto;
      margin: 0;
    }

    .oqu-cyber-mission-step {
      background: radial-gradient(circle at top right, rgba(34,211,238,0.20), transparent 32%), #08111f;
      color: #dbeafe;
      border-color: #1e3a8a;
    }

    .oqu-cyber-mission-step h2,
    .oqu-cyber-mission-step p {
      color: #e0f2fe;
    }

    .oqu-cyber-badge {
      border: 1px solid #22d3ee;
      color: #67e8f9;
      border-radius: 9999px;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .oqu-cyber-layout {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .oqu-cyber-panel,
    .oqu-cyber-code-area,
    .oqu-cyber-preview-area {
      border: 1px solid rgba(34,211,238,0.35);
      background: rgba(15,23,42,0.82);
      border-radius: 18px;
      padding: 14px;
    }

    .oqu-cyber-preview-area {
      grid-column: span 2;
    }

    .oqu-cyber-window-label {
      color: #67e8f9;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      margin-bottom: 8px;
    }

    .oqu-cyber-preview-box {
      border: 1px dashed rgba(103,232,249,0.50);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #93c5fd;
    }

    .oqu-cyber-success {
      border: 1px solid rgba(74,222,128,0.40);
      background: rgba(20,83,45,0.34);
      color: #bbf7d0;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
      font-weight: 900;
    }

    .oqu-drag-island-step {
      background: linear-gradient(180deg, #ecfeff, #fef9c3 62%, #dcfce7);
      border-color: #bae6fd;
    }

    .oqu-island-board {
      border: 2px solid #7dd3fc;
      background: linear-gradient(135deg, rgba(125,211,252,0.26), rgba(255,255,255,0.72));
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .oqu-island-water {
      min-height: 140px;
      border: 2px dashed #38bdf8;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0369a1;
      font-weight: 900;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.45);
    }

    .oqu-island-card-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .oqu-island-card {
      background: #fff;
      border: 1px solid #facc15;
      border-radius: 14px;
      padding: 9px 12px;
      color: #92400e;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(180,83,9,0.12);
    }

    /* ── Practice mode playtest ───────────────────────────────────── */

    .oqu-playtest-shell {
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.16), transparent 36%),
        linear-gradient(180deg, #ecfdf5 0%, #f8fafc 48%, #ffffff 100%);
    }

    .oqu-playtest-topbar {
      border-bottom-color: #d1fae5;
    }

    .oqu-playtest-progress-label {
      flex-shrink: 0;
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      color: #047857;
      border-radius: 9999px;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 900;
    }

    .oqu-playtest-progress-track {
      height: 6px;
      background: #d1fae5;
      overflow: hidden;
    }

    .oqu-playtest-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      border-radius: 0 9999px 9999px 0;
      transition: width 0.22s ease;
    }

    .oqu-playtest-canvas {
      min-height: 390px;
      max-height: 570px;
      padding-bottom: 24px;
    }

    .oqu-playtest-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 18px 18px;
      background: rgba(255,255,255,0.9);
      border-top: 1px solid #e5e7eb;
    }

    .oqu-playtest-nav-btn {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #374151;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 900;
      transition: background 0.12s ease, transform 0.12s ease;
    }

    .oqu-playtest-nav-btn:hover:not(:disabled) {
      background: #f9fafb;
      transform: translateY(-1px);
    }

    .oqu-playtest-nav-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .oqu-playtest-complete-btn {
      border: none;
      background: #059669;
      color: #ffffff;
      border-radius: 14px;
      padding: 11px 18px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(5,150,105,0.20);
      transition: background 0.12s ease, transform 0.12s ease;
    }

    .oqu-playtest-complete-btn:hover {
      background: #047857;
      transform: translateY(-1px);
    }

    .oqu-playtest-empty,
    .oqu-playtest-finished {
      width: min(420px, 100%);
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.10);
      padding: 32px 26px;
      text-align: center;
    }

    /* ── Reusable course player ───────────────────────────────────── */

    .course-player-root {
      min-height: 100%;
    }

    .course-player-shell {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 18% 0%, rgba(14,165,233,0.18), transparent 30%),
        radial-gradient(circle at 86% 8%, rgba(16,185,129,0.18), transparent 34%),
        linear-gradient(180deg, #f0f9ff 0%, #f8fafc 48%, #ffffff 100%);
