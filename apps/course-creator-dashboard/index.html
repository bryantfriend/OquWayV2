<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Course Creator - Phase A Catalog</title>
  <!-- Prevent Live Preview 404 hang for favicon -->
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .builder-shell {
      background:
        radial-gradient(circle at 10% 0%, rgba(37,99,235,0.12), transparent 30%),
        linear-gradient(135deg, #f8fbff 0%, #f0fdf4 58%, #fff7ed 100%);
      color: #172033;
    }

    .builder-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid rgba(219,229,242,0.9);
      box-shadow: 0 12px 40px rgba(23,32,51,0.06);
      backdrop-filter: blur(14px);
    }

    .builder-brand {
      display: grid;
      gap: 0.1rem;
    }

    .builder-brand span {
      color: #2563eb;
      font-size: 1.45rem;
      font-weight: 900;
    }

    .builder-brand small,
    .builder-eyebrow {
      color: #059669;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .builder-main {
      width: min(1240px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    .builder-hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(219,229,242,0.95);
      border-radius: 32px;
      box-shadow: 0 22px 60px rgba(23,32,51,0.10);
      padding: 1.4rem;
      overflow: hidden;
    }

    .builder-hero h1 {
      margin: 0.2rem 0;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .builder-hero p {
      max-width: 680px;
      margin: 0;
      color: #64748b;
      font-weight: 650;
      line-height: 1.6;
    }

    .builder-hero img {
      width: min(300px, 32vw);
      flex: 0 0 auto;
    }

    .builder-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1rem 0;
    }

    .builder-search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: rgba(255,255,255,0.86);
      border: 1px solid #dbe5f2;
      border-radius: 18px;
      padding: 0 1rem;
      min-height: 48px;
    }

    .builder-search input,
    .builder-select,
    .builder-form-grid input,
    .builder-form-grid textarea,
    .builder-form-grid select {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #172033;
      font-weight: 750;
    }

    .builder-select {
      width: 180px;
      min-height: 48px;
      background: rgba(255,255,255,0.86);
      border: 1px solid #dbe5f2;
      border-radius: 18px;
      padding: 0 0.8rem;
    }

    .builder-nav-actions,
    .builder-card-actions,
    .builder-modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .builder-nav-actions {
      align-items: center;
    }

    .builder-user-chip {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 44px;
      max-width: 220px;
      border: 1px solid #dbe5f2;
      border-radius: 999px;
      padding: 0.42rem 0.85rem;
      background: rgba(255,255,255,0.82);
      color: #172033;
      line-height: 1.15;
    }

    .builder-user-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .builder-user-chip small {
      color: #64748b;
      font-size: 0.66rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .builder-btn,
    .builder-card-actions button,
    .builder-icon-btn {
      border: 0;
      border-radius: 999px;
      padding: 0.78rem 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }

    .builder-btn:hover,
    .builder-card-actions button:hover,
    .builder-icon-btn:hover {
      transform: translateY(-1px);
    }

    .builder-btn-primary,
    .builder-card-actions button:nth-child(3),
    .builder-card-actions button:nth-child(4) {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 12px 28px rgba(37,99,235,0.20);
    }

    .builder-btn-ghost,
    .builder-card-actions button,
    .builder-icon-btn {
      background: #fff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }

    .builder-course-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .builder-course-card {
      display: grid;
      gap: 0.85rem;
      min-height: 330px;
      background: linear-gradient(145deg, #fff 0%, #f8fbff 58%, #ecfdf5 100%);
      border: 1px solid rgba(148,163,184,0.34);
      border-radius: 28px;
      box-shadow: 0 18px 44px rgba(23,32,51,0.08);
      padding: 1rem;
    }

    .editor-tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #64748b;
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 900;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .editor-tab-btn:hover {
      transform: translateY(-1px);
      border-color: #a7f3d0;
      background: #f0fdfa;
      color: #047857;
    }

    .editor-tab-btn.oqu-editor-tab-active {
      border-color: #34d399;
      background: linear-gradient(135deg, #ecfdf5 0%, #eff6ff 100%);
      color: #065f46;
      box-shadow: 0 10px 24px rgba(16, 185, 129, 0.14);
    }

    .builder-course-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .builder-course-card-top img {
      width: 104px;
      height: 86px;
      object-fit: cover;
      border-radius: 16px;
      background: #f8fafc;
    }

    .builder-course-card h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .builder-course-card p {
      margin: 0;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 650;
      line-height: 1.5;
    }

    .builder-course-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .builder-course-meta span,
    .builder-badge {
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      padding: 0.38rem 0.58rem;
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .builder-badge-published {
      background: #dcfce7;
      color: #047857;
    }

    .builder-badge-archived {
      background: #f1f5f9;
      color: #64748b;
    }

    .builder-course-meta .builder-count-source {
      background: #fff7ed;
      color: #c2410c;
    }

    .builder-status {
      border-radius: 18px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      font-weight: 900;
    }

    .builder-status-loading {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }

    .builder-status-success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #bbf7d0;
    }

    .builder-status-error,
    .builder-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .builder-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,0.70);
      padding: 1rem;
    }

    .builder-modal.hidden {
      display: none;
    }

    .builder-modal-panel {
      width: min(720px, 100%);
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 30px 80px rgba(15,23,42,0.24);
      padding: 1.2rem;
    }

    .builder-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .builder-modal-head h2 {
      margin: 0.15rem 0 0;
      font-size: 1.6rem;
      font-weight: 900;
    }

    .builder-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem;
    }

    .builder-form-grid label {
      display: grid;
      gap: 0.35rem;
      color: #64748b;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .builder-form-grid input,
    .builder-form-grid textarea,
    .builder-form-grid select {
      min-height: 46px;
      border: 1px solid #dbe5f2;
      border-radius: 16px;
      padding: 0.65rem 0.8rem;
      text-transform: none;
    }

    .builder-form-grid textarea {
      min-height: 96px;
      resize: vertical;
    }

    .builder-field-wide {
      grid-column: 1 / -1;
    }

    .builder-empty {
      grid-column: 1 / -1;
      text-align: center;
      background: rgba(255,255,255,0.86);
      border: 1px dashed #cbd5e1;
      border-radius: 30px;
      padding: 2.5rem 1rem;
    }

    .builder-empty img {
      width: min(280px, 80%);
      margin: 0 auto 1rem;
    }

    .builder-skeleton div,
    .builder-skeleton span,
    .builder-skeleton p {
      border-radius: 14px;
      background: linear-gradient(90deg, #f1f5f9, #e2e8f0, #f1f5f9);
      min-height: 20px;
    }

    @media (max-width: 980px) {
      .builder-course-grid,
      .builder-form-grid {
        grid-template-columns: 1fr;
      }

      .builder-hero,
      .builder-toolbar,
      .builder-nav {
        align-items: stretch;
        flex-direction: column;
      }

      .builder-select {
        width: 100%;
      }
    }

    /* ── ICF Creation / Loading Feedback ───────────────────────── */

    @keyframes oquSpinCw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes oquSkeletonShimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    @keyframes oquSuccessScale {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    .oqu-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: oquSpinCw 0.65s linear infinite;
      vertical-align: middle;
    }

    .oqu-spinner-blue {
      border-color: rgba(59,130,246,0.25);
      border-top-color: #3b82f6;
    }

    .oqu-skeleton-line {
      border-radius: 6px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 37%, #f0f0f0 63%);
      background-size: 400px 100%;
      animation: oquSkeletonShimmer 1.4s ease infinite;
    }

    .oqu-skeleton-card {
      border-radius: 10px;
      background: linear-gradient(90deg, #f4f4f4 25%, #eaeaea 37%, #f4f4f4 63%);
      background-size: 400px 100%;
      animation: oquSkeletonShimmer 1.4s ease infinite;
    }

    .oqu-success-icon {
      display: inline-block;
      animation: oquSuccessScale 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes moduleWizardCardBuild {
      0% { transform: translateY(22px) scale(0.92); opacity: 0; }
      45% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-4px) scale(1); opacity: 1; }
    }

    @keyframes moduleWizardDotConnect {
      0%, 15% { transform: scale(0.55); opacity: 0.35; }
      45%, 100% { transform: scale(1); opacity: 1; }
    }

    @keyframes moduleWizardProgressPulse {
      0% { transform: scaleX(0.2); opacity: 0.35; }
      55% { transform: scaleX(1); opacity: 1; }
      100% { transform: scaleX(1); opacity: 0.55; }
    }

    .module-wizard-loading-card {
      width: min(520px, 100%);
      border: 1px solid #dbeafe;
      border-radius: 24px;
      background:
        radial-gradient(circle at 18% 12%, rgba(16,185,129,0.16), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #eff6ff 55%, #ecfdf5 100%);
      box-shadow: 0 26px 70px rgba(15,23,42,0.16);
      padding: 32px;
      text-align: center;
    }

    .module-wizard-stage {
      position: relative;
      width: 250px;
      height: 150px;
      margin: 0 auto 24px;
    }

    .module-wizard-stage::before {
      content: "";
      position: absolute;
      left: 38px;
      right: 38px;
      top: 76px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      transform-origin: left center;
      animation: moduleWizardProgressPulse 1.8s ease-in-out infinite;
    }

    .module-wizard-path-dot {
      position: absolute;
      top: 66px;
      width: 22px;
      height: 22px;
      border: 4px solid #ffffff;
      border-radius: 999px;
      background: #2563eb;
      box-shadow: 0 10px 22px rgba(37,99,235,0.22);
      animation: moduleWizardDotConnect 1.8s ease-in-out infinite;
    }

    .module-wizard-path-dot-one { left: 26px; animation-delay: 0s; }
    .module-wizard-path-dot-two { left: 113px; background: #0ea5e9; animation-delay: 0.25s; }
    .module-wizard-path-dot-three { right: 26px; background: #10b981; animation-delay: 0.5s; }

    .module-wizard-card-stack {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
    }

    .module-wizard-mini-card {
      display: grid;
      align-content: center;
      gap: 9px;
      width: 64px;
      height: 86px;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 16px 34px rgba(15,23,42,0.10);
      color: #2563eb;
      opacity: 0;
      animation: moduleWizardCardBuild 1.8s ease-in-out infinite;
    }

    .module-wizard-mini-card i {
      font-size: 20px;
    }

    .module-wizard-mini-card span {
      width: 34px;
      height: 5px;
      margin: 0 auto;
      border-radius: 999px;
      background: #bfdbfe;
    }

    .module-wizard-mini-card-one { animation-delay: 0s; }
    .module-wizard-mini-card-two { height: 104px; color: #0ea5e9; animation-delay: 0.25s; }
    .module-wizard-mini-card-three { color: #10b981; animation-delay: 0.5s; }

    .module-wizard-progress-step {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      transform-origin: left center;
      animation: moduleWizardProgressPulse 1.55s ease-in-out infinite;
    }

    .module-wizard-progress-step:nth-child(2) { animation-delay: 0.15s; }
    .module-wizard-progress-step:nth-child(3) { animation-delay: 0.3s; }
    .module-wizard-progress-step:nth-child(4) { animation-delay: 0.45s; }

    .module-wizard-success-card {
      border-color: #bbf7d0;
      background: linear-gradient(135deg, #ffffff 0%, #ecfdf5 100%);
    }

    .module-wizard-success-icon,
    .module-wizard-error-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 74px;
      height: 74px;
      margin-bottom: 18px;
      border-radius: 24px;
      font-size: 30px;
      animation: oquSuccessScale 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .module-wizard-success-icon {
      background: #dcfce7;
      color: #15803d;
    }

    .module-wizard-error-card {
      border-color: #fecaca;
      background: linear-gradient(135deg, #ffffff 0%, #fff7ed 100%);
    }

    .module-wizard-error-icon {
      background: #fef2f2;
      color: #dc2626;
    }

    .oqu-status-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .oqu-status-creating {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }

    .oqu-status-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .oqu-status-success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .oqu-btn-pending {
      opacity: 0.75;
      cursor: not-allowed !important;
      pointer-events: none;
    }

    /* ── Status Pills ─────────────────────────────────────────────── */

    .oqu-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .oqu-pill-shell   { background: #f3f4f6; color: #6b7280; }
    .oqu-pill-draft   { background: #fef3c7; color: #b45309; }
    .oqu-pill-ready   { background: #dbeafe; color: #1d4ed8; }
    .oqu-pill-active  { background: #dcfce7; color: #15803d; }
    .oqu-pill-disabled{ background: #f1f5f9; color: #94a3b8; }
    .oqu-pill-archived{ background: #1e293b; color: #94a3b8; }

    /* ── Accordion ────────────────────────────────────────────────── */

    .oqu-accordion-body {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.22s ease;
    }

    .oqu-accordion-body.oqu-accordion-open {
      max-height: 4000px;
      opacity: 1;
      transition: max-height 0.42s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.28s ease;
    }

    .oqu-accordion-chevron {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-block;
    }

    .oqu-accordion-header.oqu-accordion-header-open .oqu-accordion-chevron {
      transform: rotate(90deg);
    }

    .oqu-accordion-header {
      display: flex;
      align-items: center;
      width: 100%;
      text-align: left;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 12px 16px;
      gap: 10px;
      border-radius: 10px;
      transition: background 0.15s ease;
    }

    .oqu-accordion-header:hover {
      background: #f9fafb;
    }

    .oqu-accordion-header.oqu-accordion-header-open {
      background: #eff6ff;
    }

    /* ── Progress Bar ─────────────────────────────────────────────── */

    .oqu-progress-track {
      flex-shrink: 0;
      width: 56px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
    }

    .oqu-progress-fill {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      transition: width 0.4s ease;
    }

    .oqu-progress-fill.oqu-progress-done {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }

    /* ── Step Type Picker ─────────────────────────────────────────── */

    .oqu-step-picker {
      display: none;
      border: 1px solid #e0e7ff;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(59,130,246,0.10);
      margin-top: 4px;
    }

    .oqu-step-picker-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: background 0.12s ease;
    }

    .oqu-step-picker-option:hover {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .oqu-step-picker-option + .oqu-step-picker-option {
      border-top: 1px solid #f3f4f6;
    }

    /* ── Property Grid ────────────────────────────────────────────── */

    .oqu-prop-section-label {
      font-size: 9px;
      font-weight: 800;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .oqu-prop-section-label:first-child {
      margin-top: 0;
    }

    .oqu-prop-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .oqu-prop-row:last-child {
      border-bottom: none;
    }

    .oqu-prop-label {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .oqu-prop-value {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      line-height: 1.4;
    }

    .oqu-prop-value-muted {
      font-size: 12px;
      color: #6b7280;
    }

    /* ── Workspace Sticky Header ──────────────────────────────────── */

    .oqu-workspace-sticky {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    /* ── Preview Box ──────────────────────────────────────────────── */

    .pm-preview-box {
      cursor: pointer;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      text-align: left;
    }

    .pm-preview-box:hover {
      border-color: #93c5fd;
      box-shadow: 0 2px 8px rgba(59,130,246,0.10);
      background: #f8fbff;
    }

    .pm-preview-box.pm-preview-box-active {
      border-color: #3b82f6;
      background: #eff6ff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    /* ── Step navigation tiles ────────────────────────────────────── */

    .oqu-step-tile {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
      text-align: left;
      width: 100%;
    }

    .oqu-step-order-number {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border-radius: 9999px;
      background: #f3f4f6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      color: #6b7280;
    }

    .oqu-step-tile:hover {
      border-color: #93c5fd;
      background: #f8fbff;
    }

    .oqu-step-tile.oqu-step-tile-active {
      border-color: #3b82f6;
      background: #eff6ff;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.14);
    }

    .oqu-step-tile-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .oqu-step-icon-btn {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #6b7280;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .oqu-step-icon-btn:hover:not(:disabled) {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .oqu-step-icon-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }


    .oqu-step-drag-handle {
      width: 24px;
      height: 24px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      color: #64748b;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      flex-shrink: 0;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .oqu-step-drag-handle:hover {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1d4ed8;
    }

    .oqu-step-drag-handle:active {
      cursor: grabbing;
    }

    .oqu-step-tile.is-dragging {
      opacity: 0.52;
      border-style: dashed;
    }

    .oqu-step-drop-zone {
      height: 0;
      display: flex;
      align-items: center;
      padding: 0 8px;
      overflow: visible;
      pointer-events: none;
    }

    .oqu-step-drop-zone span {
      display: block;
      width: 100%;
      height: 0;
      border-radius: 9999px;
      background: #2563eb;
      box-shadow: 0 0 0 0 rgba(37,99,235,0);
      transition: height 0.1s ease, box-shadow 0.1s ease;
    }

    .oqu-step-drop-zone.is-visible {
      height: 8px;
      margin: 2px 0;
    }

    .oqu-step-drop-zone.is-visible span {
      height: 3px;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.14);
    }
    .oqu-step-delete-btn {
      border: 1px solid #fee2e2;
      background: #fff7f7;
      color: #dc2626;
      border-radius: 7px;
      padding: 4px 7px;
      font-size: 9px;
      font-weight: 900;
      transition: background 0.12s ease;
    }

    .oqu-step-delete-btn:hover {
      background: #fee2e2;
    }

    .oqu-step-preview-btn {
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      color: #047857;
      border-radius: 7px;
      padding: 4px 8px;
      font-size: 9px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .oqu-step-preview-btn:hover {
      background: #dcfce7;
      border-color: #86efac;
      transform: translateY(-1px);
    }

    /* ── Preview canvas ───────────────────────────────────────────── */

    .oqu-preview-canvas {
      background: #f4f6f9;
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px 28px;

      max-height: 460px;
      overflow-y: auto;

    .oqu-preview-canvas-full {

    .oqu-preview-toolbar {

    .oqu-student-view-btn,

      border-radius: 9999px;

    .oqu-preview-card {

    .oqu-preview-type-badge {

      font-weight: 900;
      text-transform: uppercase;

      color: #6b7280;
      margin-bottom: 14px;
      padding: 3px 9px;

    .oqu-preview-word {

      margin-bottom: 14px;

    }

    .oqu-preview-title {
      font-size: 18px;

      margin-bottom: 10px;

    .oqu-preview-instructions {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .oqu-preview-image-ph {
      width: 100%;
      height: 100px;
      background: linear-gradient(135deg, #f0f9ff, #dbeafe);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 14px;
    }

    .oqu-preview-audio-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #2563eb;
      color: #fff;
      padding: 7px 16px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 700;

    }

    .oqu-preview-record-btn {
      display: inline-flex;

      padding: 9px 18px;

    .oqu-preview-audio-track {

      background: #e5e7eb;
      border-radius: 9999px;

    .oqu-preview-audio-fill {
      width: 28%;

    .oqu-preview-input-mock {

    .oqu-preview-reveal-btn {

    .oqu-full-preview-wrap {

    .oqu-full-preview-actions {

    /* ── Step picker modal ────────────────────────────────────────── */

    .oqu-step-picker-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(15,23,42,0.38);

    .oqu-step-picker-close {

      height: 32px;

      border: 1.5px solid #e5e7eb;

    .oqu-step-picker-card-description {

    .oqu-step-picker-card-category {

    .course-player-complete-btn,
