    .course-player-topbar {
      position: sticky;
      top: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      background: rgba(255,255,255,0.9);
      border-bottom: 1px solid #dbeafe;
      backdrop-filter: blur(10px);
    }

    .course-player-back-btn {
      flex-shrink: 0;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 9999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 900;
    }

    .course-player-title-block {
      min-width: 0;
      flex: 1;
    }

    .course-player-kicker {
      color: #0284c7;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .course-player-title-block h1 {
      margin: 0;
      color: #0f172a;
      font-size: 19px;
      line-height: 1.15;
      font-weight: 950;
    }

    .course-player-title-block p {
      margin: 4px 0 0;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .course-player-step-count {
      flex-shrink: 0;
      border: 1px solid #bae6fd;
      background: #f0f9ff;
      color: #0369a1;
      border-radius: 9999px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 900;
    }

    .course-player-progress-track {
      height: 8px;
      background: #dbeafe;
      overflow: hidden;
    }

    .course-player-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0ea5e9, #10b981);
      border-radius: 0 9999px 9999px 0;
      transition: width 0.24s ease;
    }

    .course-player-warning {
      margin: 14px auto 0;
      width: min(860px, calc(100% - 40px));
      border: 1px solid #fed7aa;
      background: #fff7ed;
      color: #c2410c;
      border-radius: 16px;
      padding: 10px 13px;
      font-size: 12px;
      font-weight: 900;
    }

    .course-player-stage {
      flex: 1;
      min-height: 430px;
      max-height: 650px;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 34px 20px 28px;
    }

    .course-player-step-card {
      width: min(900px, 100%);
    }

    .course-player-render-target {
      width: 100%;
    }

    .course-player-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px 12px;
      background: rgba(255,255,255,0.92);
      border-top: 1px solid #e2e8f0;
    }

    .course-player-nav-btn,
    .course-player-complete-btn,
    .course-player-restart-btn {
      border: none;
      border-radius: 15px;
      padding: 11px 17px;
      font-size: 12px;
      font-weight: 900;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    .course-player-nav-btn {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #334155;
    }

    .course-player-complete-btn,
    .course-player-restart-btn {
      background: #0f172a;
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(15,23,42,0.18);
    }

    .course-player-nav-btn:hover:not(:disabled),
    .course-player-complete-btn:hover,
    .course-player-restart-btn:hover {
      transform: translateY(-1px);
    }

    .course-player-nav-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .course-player-skip-note {
      padding: 0 20px 16px;
      color: #64748b;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      background: rgba(255,255,255,0.92);
    }

    .course-player-empty-state,
    .course-player-complete-card {
      width: min(640px, calc(100% - 40px));
      margin: 46px auto;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 30px;
      box-shadow: 0 24px 70px rgba(15,23,42,0.12);
      padding: 38px 30px;
      text-align: center;
    }

    .course-player-empty-icon,
    .course-player-complete-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ecfeff;
      color: #0891b2;
      font-size: 34px;
      font-weight: 950;
    }

    .course-player-empty-state h2,
    .course-player-complete-card h2 {
      margin: 0 0 8px;
      color: #0f172a;
      font-size: 24px;
      font-weight: 950;
    }

    .course-player-empty-state p,
    .course-player-complete-card p {
      margin: 0;
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
    }

    .course-player-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 24px 0;
    }

    .course-player-summary-grid div {
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 18px;
      padding: 14px 10px;
    }

    .course-player-summary-grid strong,
    .course-player-summary-grid span {
      display: block;
    }

    .course-player-summary-grid strong {
      color: #0f172a;
      font-size: 18px;
      font-weight: 950;
      margin-bottom: 4px;
    }

    .course-player-summary-grid span {
      color: #64748b;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .course-player-complete-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .course-player-fallback-label {
      display: inline-flex;
      border-radius: 9999px;
      background: #fef2f2;
      color: #dc2626;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .course-player-fallback-type {
      border: 1px dashed #cbd5e1;
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
    }

    /* ── Step Preview Page ───────────────────────────────────────── */

    .step-preview-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
    }

    .step-preview-topbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 18px;
      padding: 18px 24px;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 8px 22px rgba(15,23,42,0.05);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .step-preview-back-link,
    .step-preview-primary-btn {
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 9999px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: background 0.12s ease, transform 0.12s ease;
    }

    .step-preview-back-link:hover,
    .step-preview-primary-btn:hover {
      background: #dbeafe;
      transform: translateY(-1px);
    }

    .step-preview-title-block {
      min-width: 0;
    }

    .step-preview-mode-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border: 1px solid #bbf7d0;
      background: #ecfdf5;
      color: #047857;
      border-radius: 9999px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .step-preview-title-block h1 {
      margin: 0;
      color: #0f172a;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-preview-title-block p {
      margin: 4px 0 0;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }

    .step-preview-stage {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 24px;
      flex: 1;
    }

    .step-preview-context {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .step-preview-context div {
      border: 1px solid #e2e8f0;
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 0;
    }

    .step-preview-context span {
      display: block;
      color: #94a3b8;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .step-preview-context strong {
      display: block;
      color: #0f172a;
      font-size: 13px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-preview-player-root {
      min-height: 560px;
    }

    .step-preview-loading,
    .step-preview-error-state {
      min-height: 420px;
      border: 1px solid #e2e8f0;
      background: #fff;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 36px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.08);
    }

    .step-preview-spinner {
      width: 38px;
      height: 38px;
      border: 4px solid #dbeafe;
      border-top-color: #2563eb;
      border-radius: 9999px;
      animation: oqu-spin 0.9s linear infinite;
      margin-bottom: 16px;
    }

    .step-preview-loading-title {
      color: #0f172a;
      font-size: 16px;
      font-weight: 950;
      margin-bottom: 6px;
    }

    .step-preview-loading p,
    .step-preview-error-state p {
      color: #64748b;
      font-size: 13px;
      font-weight: 650;
      margin: 0;
      max-width: 440px;
      line-height: 1.6;
    }

    .step-preview-error-icon {
      width: 44px;
      height: 44px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: 22px;
      font-weight: 1000;
      margin-bottom: 14px;
    }

    .step-preview-error-state h1 {
      margin: 0 0 8px;
      color: #111827;
      font-size: 22px;
      font-weight: 950;
    }

    .step-preview-error-state dl {
      width: min(520px, 100%);
      margin: 22px 0;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      text-align: left;
    }

    .step-preview-error-state dl div {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 12px;
      padding: 11px 13px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .step-preview-error-state dl div:last-child {
      border-bottom: 0;
    }

    .step-preview-error-state dt {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .step-preview-error-state dd {
      margin: 0;
      color: #334155;
      font-size: 12px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    @keyframes oqu-spin {
      to { transform: rotate(360deg); }
    }

    .oqu-media-upload-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .oqu-media-upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 9px;
      padding: 6px 9px;
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .oqu-media-upload-btn:hover {
      background: #dbeafe;
    }

    .oqu-media-upload-btn input {
      display: none;
    }

    .oqu-media-upload-status {
      font-size: 10px;
      font-weight: 800;
      color: #64748b;
    }

    .oqu-action-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      border-radius: 999px;
      border: 1px solid #dbeafe;
      background: linear-gradient(135deg, #eff6ff, #f0fdfa);
      padding: 5px 9px;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.08);
      color: #1e40af;
      white-space: nowrap;
    }

    .oqu-action-status-media {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 18px;
      color: #2563eb;
    }

    .oqu-action-status-media .fa-image {
      position: absolute;
      left: 0;
      animation: oqu-image-fly 1.1s ease-in-out infinite;
    }

    .oqu-action-status-media .fa-cloud-arrow-up {
      position: absolute;
      right: 0;
      color: #0f766e;
    }

    .oqu-action-status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #dbeafe;
      color: #2563eb;
    }

    .oqu-action-status-success {
      border-color: #bbf7d0;
      background: linear-gradient(135deg, #f0fdf4, #ecfeff);
      color: #166534;
    }

    .oqu-action-status-success .oqu-action-status-icon {
      background: #bbf7d0;
      color: #15803d;
    }

    .oqu-action-status-error {
      border-color: #fecdd3;
      background: linear-gradient(135deg, #fff1f2, #fff7ed);
      color: #be123c;
    }

    .oqu-action-status-error .oqu-action-status-icon {
      background: #fecdd3;
      color: #be123c;
    }

    @keyframes oqu-image-fly {
      0% { transform: translateX(0) translateY(4px) scale(0.88); opacity: 0.45; }
      45% { transform: translateX(9px) translateY(-2px) scale(1); opacity: 1; }
      100% { transform: translateX(15px) translateY(-5px) scale(0.82); opacity: 0.25; }
    }

    .oqu-media-upload-uploading {
      color: #2563eb;
    }

    .oqu-media-upload-success {
      color: #16a34a;
    }

    .oqu-media-upload-error {
      color: #dc2626;
    }

    .oqu-media-preview-empty {
      border: 1px dashed #e5e7eb;
      background: #f9fafb;
      color: #9ca3af;
      border-radius: 10px;
      padding: 10px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 8px;
    }

    .oqu-media-preview-image {
      width: 100%;
      max-height: 150px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      margin-top: 8px;
      background: #f8fafc;
    }

    .oqu-media-preview-audio {
      width: 100%;
      margin-top: 8px;
    }

    @media (max-width: 760px) {
      .oqu-step-picker-grid,
      .oqu-reveal-grid,
      .oqu-hero-intro-layout,
      .oqu-match-board {
        grid-template-columns: 1fr;
      }

      .oqu-cyber-layout {
        grid-template-columns: 1fr;
      }

      .oqu-cyber-preview-area {
        grid-column: span 1;
      }

      .course-player-topbar,
      .course-player-footer {
        align-items: stretch;
        flex-direction: column;
      }

      .course-player-step-count {
        align-self: flex-start;
      }

      .course-player-summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .oqu-preview-canvas {
        max-height: 520px;
      }
    }

    /* ── Property inspector fields ────────────────────────────────── */

    .oqu-inspector-field {
      margin-bottom: 13px;
    }

    .oqu-config-section {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f8fafc;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .oqu-config-section summary {
      cursor: pointer;
      list-style: none;
      padding: 10px 11px;
      color: #111827;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .oqu-config-section summary::-webkit-details-marker {
      display: none;
    }

    .oqu-config-section summary::after {
      content: "+";
      color: #64748b;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }

    .oqu-config-section[open] summary::after {
      content: "-";
    }

    .oqu-config-section-body {
      border-top: 1px solid #e5e7eb;
      background: #fff;
      padding: 11px 11px 1px;
    }

    .oqu-inspector-label {
      display: block;
      font-size: 9px;
      font-weight: 800;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
    }

    .oqu-inspector-help {
      color: #64748b;
      font-size: 10px;
      font-weight: 650;
      line-height: 1.35;
      margin-top: 5px;
    }

    .oqu-inspector-input {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: #111827;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    .oqu-inspector-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.10);
    }

    .oqu-inspector-textarea {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: #374151;
      min-height: 76px;
      resize: vertical;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    .oqu-inspector-textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.10);
    }

    .cards-text-editor-shell {
      border: 1px solid #e0e7ff;
      border-radius: 10px;
      background: #f8fbff;
      padding: 8px;
    }

    .cards-text-editor-guide {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cards-text-editor-guide div {
      min-width: 0;
    }

    .cards-text-editor-guide strong,
    .cards-text-editor-guide span,
    .cards-text-editor-example {
      display: block;
    }

    .cards-text-editor-guide strong {
      color: #1e293b;
      font-size: 11px;
      font-weight: 900;
      line-height: 1.2;
    }

    .cards-text-editor-guide span,
    .cards-text-editor-example {
      color: #64748b;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.35;
    }

    .append-card-line-btn {
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      background: #fff;
      color: #1d4ed8;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      padding: 6px 8px;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .append-card-line-btn:hover {
      background: #eff6ff;
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    .cards-text-editor-textarea {
      min-height: 154px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height: 1.5;
      background: #fff;
      resize: vertical;
    }

    .cards-text-editor-example {
      border-top: 1px solid #e0e7ff;
      margin-top: 8px;
      padding-top: 7px;
      overflow-wrap: anywhere;
    }

    .cards-text-editor-example span {
      color: #2563eb;
      display: inline;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.08em;
      margin-right: 5px;
      text-transform: uppercase;
    }

    .oqu-inspector-select {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: #111827;
      outline: none;
      background: #fff;
      box-sizing: border-box;
    }

    .activity-template-section {
      margin: 2px 0 13px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      padding: 9px;
    }

    .activity-template-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .activity-template-header .oqu-inspector-section {
      margin-bottom: 0;
    }

    .activity-template-help {
      color: #94a3b8;
      font-size: 9px;
      font-weight: 850;
      white-space: nowrap;
    }

    .activity-template-list {
      display: grid;
      gap: 6px;
      max-height: 230px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .activity-template-option {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      min-width: 0;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .activity-template-option:hover {
