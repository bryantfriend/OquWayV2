<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>OquWay – Login</title>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.11.1/firebase-storage.js"
      }
    }
  </script>

    <script type="module" src="./login.js"></script>
    <style>
        :root {
            --ink: #172033;
            --muted: #64748b;
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --line: #dbe4f0;
            --success: #047857;
            --danger: #dc2626;
        }

        body {
            font-family: Inter, Arial, sans-serif;
            background:
                radial-gradient(circle at 18% 14%, rgba(125, 211, 252, 0.28), transparent 28%),
                linear-gradient(135deg, #f8fafc 0%, #eef6ff 45%, #fff7ed 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
        }

        .card {
            background: rgba(255, 255, 255, 0.94);
            padding: 34px;
            border-radius: 22px;
            width: min(360px, calc(100vw - 32px));
            border: 1px solid rgba(219, 228, 240, 0.9);
            box-shadow: 0 28px 80px rgba(37, 99, 235, 0.14);
        }

        h2 {
            margin: 0 0 8px;
            font-size: 1.75rem;
        }

        .subtitle {
            margin: 0 0 22px;
            color: var(--muted);
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--line);
            border-radius: 14px;
            box-sizing: border-box;
            font-size: 0.96rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 900;
        }

        button:hover:not(:disabled) {
            background: var(--blue-dark);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin: -6px 0 18px;
        }

        .link-button {
            width: auto;
            padding: 0;
            background: transparent;
            color: var(--blue);
            border-radius: 0;
            font-weight: 900;
        }

        .link-button:hover:not(:disabled) {
            background: transparent;
            color: var(--blue-dark);
            transform: none;
        }

        .error {
            color: var(--danger);
            margin-top: 12px;
            font-weight: 800;
            min-height: 20px;
        }

        .reset-modal-backdrop[hidden] {
            display: none;
        }

        .reset-modal-backdrop {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.52);
        }

        .reset-modal {
            width: min(430px, 100%);
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 30px 90px rgba(15, 23, 42, 0.24);
        }

        .reset-modal h3 {
            margin: 0 0 8px;
            font-size: 1.35rem;
        }

        .reset-modal p {
            margin: 0 0 18px;
            color: var(--muted);
            font-weight: 700;
            line-height: 1.45;
        }

        .reset-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .secondary {
            background: #eff6ff;
            color: var(--blue);
            border: 1px solid #bfdbfe;
        }

        .secondary:hover:not(:disabled) {
            background: #dbeafe;
        }

        .status {
            min-height: 20px;
            margin-top: 12px;
            font-weight: 800;
            line-height: 1.4;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--danger);
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>OquWay Login</h2>
        <p class="subtitle">Staff access for course creators and administrators.</p>

        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />
        <div class="forgot-row">
            <button type="button" class="link-button" id="forgotPasswordBtn">Forgot password?</button>
        </div>

        <button id="loginBtn">Login</button>

        <div class="error" id="error"></div>
    </div>

    <div class="reset-modal-backdrop" id="resetModal" hidden>
        <section class="reset-modal" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
            <h3 id="resetTitle">Reset staff password</h3>
            <p>Enter the email for your staff account. Firebase will send the reset link.</p>
            <input type="email" id="resetEmail" placeholder="name@example.com" />
            <div class="reset-actions">
                <button type="button" class="secondary" id="resetCancelBtn">Cancel</button>
                <button type="button" id="resetSubmitBtn">Send Reset Link</button>
            </div>
            <div class="status" id="resetStatus" aria-live="polite"></div>
        </section>
    </div>

</body>

</html>
