<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OquWay - Student Dashboard</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js",
                "firebase/functions": "https://www.gstatic.com/firebasejs/10.11.1/firebase-functions.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.11.1/firebase-storage.js"
            }
        }
    </script>
    <style>
        :root {
            --ink: #172033;
            --muted: #64748b;
            --paper: #ffffff;
            --line: #dbe5f2;
            --blue: #2563eb;
            --green: #059669;
            --amber: #b45309;
            --purple: #7c3aed;
            --coral: #f97316;
            --soft-blue: #eff6ff;
            --soft-green: #ecfdf5;
            --soft-purple: #f5f3ff;
            --soft-coral: #fff7ed;
            --bg-color: #f7fbff;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 34%),
                linear-gradient(135deg, #f7fbff 0%, #edf7f3 54%, #fff8ed 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: rgba(255,255,255,0.84);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(219, 229, 242, 0.9);
            box-shadow: 0 12px 40px rgba(23, 32, 51, 0.06);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--blue);
        }

        main {
            flex: 1;
            padding: 2rem 1.5rem 3rem;
            max-width: 1240px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        body:has(.course-focus-shell) .header {
            display: none;
        }

        main:has(.course-focus-shell) {
            max-width: 1560px;
            padding: 1rem 0.75rem 2rem;
        }

        button {
            font-family: inherit;
        }

        .student-hero,
        .student-course-heading,
        .student-player-topbar {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(219, 229, 242, 0.95);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(23, 32, 51, 0.09);
            padding: 1.35rem;
        }

        .student-hero,
        .student-course-heading,
        .student-player-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .student-hero h1,
        .student-course-heading h2,
        .student-player-topbar h1 {
            margin: 0.2rem 0;
            font-size: clamp(1.8rem, 4vw, 3.4rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        .student-course-heading h2,
        .student-player-topbar h1 {
            font-size: clamp(1.35rem, 3vw, 2.4rem);
        }

        .student-hero p,
        .student-course-heading p,
        .student-player-topbar span {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .student-eyebrow {
            color: var(--green) !important;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
            margin: 0 !important;
        }

        .student-hero-progress {
            background: var(--soft-green);
            border: 1px solid #bbf7d0;
            color: #047857;
            border-radius: 999px;
            padding: 0.75rem 1rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .student-reload-btn,
        .student-switch-student-btn,
        .student-continue-learning-btn,
        .student-course-open-btn,
        .student-bonus-claim-btn,
        .student-back-dashboard-btn,
        .student-complete-step-btn,
        .student-player-prev-btn,
        .student-player-next-btn {
            border: 0;
            border-radius: 999px;
            padding: 0.8rem 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
        }

        .student-reload-btn,
        .student-continue-learning-btn,
        .student-course-open-btn,
        .student-complete-step-btn {
            background: var(--green);
            color: white;
            box-shadow: 0 12px 28px rgba(5, 150, 105, 0.22);
        }

        .student-switch-student-btn,
        .student-back-dashboard-btn,
        .student-player-prev-btn,
        .student-player-next-btn {
            background: var(--soft-blue);
            color: var(--blue);
            border: 1px solid #bfdbfe;
        }

        .student-reload-btn:hover,
        .student-switch-student-btn:hover,
        .student-continue-learning-btn:hover,
        .student-course-open-btn:hover,
        .student-bonus-claim-btn:hover,
        .student-back-dashboard-btn:hover,
        .student-complete-step-btn:hover,
        .student-player-prev-btn:hover,
        .student-player-next-btn:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
        }

        .student-warning,
        .student-error,
        .student-status {
            margin: 1rem 0;
            border-radius: 16px;
            padding: 0.85rem 1rem;
            font-weight: 800;
        }

        .student-warning {
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: var(--amber);
        }

        .student-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .student-status {
            background: var(--soft-green);
            border: 1px solid #bbf7d0;
            color: #047857;
        }

        .student-launch-loading {
            min-height: min(760px, calc(100vh - 5rem));
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .student-launch-card {
            width: min(520px, 100%);
            background:
                radial-gradient(circle at 18% 18%, rgba(37, 99, 235, 0.16), transparent 32%),
                radial-gradient(circle at 86% 12%, rgba(5, 150, 105, 0.18), transparent 30%),
                rgba(255,255,255,0.92);
            border: 1px solid rgba(219, 229, 242, 0.96);
            border-radius: 32px;
            box-shadow: 0 28px 90px rgba(23, 32, 51, 0.14);
            padding: 2.2rem;
            text-align: center;
        }

        .student-launch-orbit {
            width: 128px;
            height: 128px;
            margin: 0 auto 1.2rem;
            position: relative;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: linear-gradient(135deg, #eff6ff, #ecfdf5);
            box-shadow: inset 0 0 0 1px rgba(191, 219, 254, 0.8);
        }

        .student-launch-orbit span {
            font-size: 3.2rem;
            animation: student-launch-float 1.8s ease-in-out infinite;
        }

        .student-launch-orbit i,
        .student-launch-orbit b {
            position: absolute;
            inset: 8px;
            border-radius: 999px;
            border: 3px dashed rgba(37, 99, 235, 0.34);
            animation: student-launch-spin 3.8s linear infinite;
        }

        .student-launch-orbit b {
            inset: 22px;
            border-color: rgba(5, 150, 105, 0.36);
            animation-direction: reverse;
            animation-duration: 2.8s;
        }

        .student-launch-card h1 {
            margin: 0.35rem 0 0.6rem;
            font-size: clamp(2rem, 5vw, 3.4rem);
            line-height: 0.96;
            letter-spacing: 0;
        }

        .student-launch-card p {
            margin: 0;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.55;
        }

        .student-launch-dots {
            display: flex;
            justify-content: center;
            gap: 0.45rem;
            margin-top: 1.25rem;
        }

        .student-launch-dots span {
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 999px;
            background: var(--green);
            animation: student-launch-pulse 1s ease-in-out infinite;
        }

        .student-launch-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .student-launch-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes student-launch-spin {
            to { transform: rotate(360deg); }
        }

        @keyframes student-launch-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-7px) scale(1.04); }
        }

        @keyframes student-launch-pulse {
            0%, 100% { transform: translateY(0); opacity: 0.45; }
            50% { transform: translateY(-5px); opacity: 1; }
        }

        .student-dashboard-grid {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .student-panel {
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(219, 229, 242, 0.95);
            border-radius: 24px;
            box-shadow: 0 18px 54px rgba(23, 32, 51, 0.08);
            padding: 1rem;
        }

        .student-panel h2 {
            margin: 0 0 0.9rem;
            font-size: 1rem;
        }

        .student-course-card,
        .student-module-card,
        .student-session-card,
        .student-practice-mode-card {
            width: 100%;
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 18px;
            padding: 0.9rem;
            text-align: left;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            transition: border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
        }

        .student-course-card:hover,
        .student-module-card:hover,
        .student-session-card:hover,
        .student-practice-mode-card:hover {
            border-color: #93c5fd;
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.10);
        }

        .student-course-card + .student-course-card,
        .student-module + .student-module,
        .student-session-card-shell + .student-session-card-shell {
            margin-top: 0.65rem;
        }

        .student-course-card {
            position: relative;
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.75rem;
            overflow: hidden;
        }

        .student-course-card::after {
            content: "";
            position: absolute;
            right: -30px;
            bottom: -34px;
            width: 98px;
            height: 98px;
            border-radius: 32px;
            background: rgba(29, 78, 216, 0.08);
            transform: rotate(18deg);
        }

        .student-course-icon {
            position: relative;
            z-index: 1;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: linear-gradient(135deg, #dbeafe 0%, #dcfce7 100%);
            color: #1d4ed8;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .student-course-card-copy,
        .student-course-card-action,
        .student-course-progress {
            position: relative;
            z-index: 1;
        }

        .student-course-card-copy {
            display: grid;
            gap: 0.18rem;
            min-width: 0;
        }

        .student-course-card-copy strong {
            overflow-wrap: anywhere;
        }

        .student-course-card-action {
            border-radius: 999px;
            background: #eef6ff;
            color: var(--blue);
            padding: 0.35rem 0.55rem;
            font-size: 0.74rem;
            font-weight: 900;
        }

        .student-course-progress {
            grid-column: 2 / 4;
        }

        .student-course-card span,
        .student-module-card span,
        .student-session-card span,
        .student-practice-mode-card strong {
            font-weight: 900;
            font-size: 1rem;
        }

        .student-course-card small,
        .student-module-card small,
        .student-session-card small,
        .student-practice-mode-card small {
            color: var(--green);
            font-weight: 900;
        }

        .student-course-card .student-course-card-action {
            font-size: 0.74rem;
        }

        .student-course-card-active,
        .student-module-active,
        .student-session-active {
            border-color: var(--blue);
            background: var(--soft-blue);
        }

        .student-main-panel {
            min-height: 520px;
        }

        .student-hero-v2 {
            position: relative;
            overflow: hidden;
            align-items: stretch;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.94), rgba(239,246,255,0.88)),
                radial-gradient(circle at 88% 22%, rgba(249,115,22,0.18), transparent 24%);
            border-radius: 30px;
        }

        .student-hero-v2::after {
            content: "";
            position: absolute;
            right: -72px;
            top: -88px;
            width: 260px;
            height: 260px;
            border-radius: 42%;
            background: linear-gradient(135deg, rgba(37,99,235,0.16), rgba(5,150,105,0.14));
            transform: rotate(18deg);
        }

        .student-avatar-wrap,
        .student-hero-copy,
        .student-hero-actions {
            position: relative;
            z-index: 1;
        }

        .student-avatar-wrap {
            width: 112px;
            height: 112px;
            flex: 0 0 112px;
            border-radius: 32px;
            background: linear-gradient(135deg, #dbeafe, #fef3c7);
            border: 1px solid rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 16px 36px rgba(37,99,235,0.16);
            overflow: hidden;
        }

        .student-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-avatar-fallback {
            width: 78px;
            height: 78px;
            border-radius: 26px;
            background: #fff;
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 900;
        }

        .student-hero-copy {
            flex: 1;
            min-width: 0;
        }

        .student-profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.9rem;
        }

        .student-profile-meta span {
            border: 1px solid rgba(37,99,235,0.16);
            background: rgba(255,255,255,0.7);
            border-radius: 999px;
            color: var(--ink);
            font-size: 0.76rem;
            font-weight: 900;
            padding: 0.45rem 0.68rem;
        }

        .student-hero-actions {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            flex-direction: column;
            gap: 0.55rem;
        }

        .student-dashboard-v2-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 1rem;
            margin-top: 1rem;
            align-items: start;
        }

        .student-dashboard-main-stack,
        .student-dashboard-side-stack {
            display: grid;
            gap: 1rem;
        }

        .student-section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .student-section-head h2 {
            margin: 0.1rem 0 0;
            font-size: 1.35rem;
        }

        .student-section-head > span {
            border: 1px solid #bfdbfe;
            background: var(--soft-blue);
            color: var(--blue);
            border-radius: 999px;
            padding: 0.45rem 0.7rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .student-continue-card {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 1rem;
            align-items: stretch;
            border-radius: 28px;
            border: 1px solid rgba(37,99,235,0.14);
            background:
                linear-gradient(135deg, rgba(255,255,255,0.94), rgba(236,253,245,0.9)),
                radial-gradient(circle at 95% 10%, rgba(124,58,237,0.18), transparent 26%);
            box-shadow: 0 22px 60px rgba(23,32,51,0.10);
            padding: 1.25rem;
            overflow: hidden;
        }

        .student-continue-copy {
            display: grid;
            gap: 0.45rem;
        }

        .student-continue-copy h2 {
            margin: 0;
            font-size: clamp(1.45rem, 3vw, 2.3rem);
            line-height: 1;
        }

        .student-continue-copy p,
        .student-continue-copy small {
            color: var(--muted);
            margin: 0;
            font-weight: 800;
        }

        .student-continue-action {
            min-width: 146px;
            border-radius: 24px;
            background: rgba(255,255,255,0.76);
            border: 1px solid rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.7rem;
            padding: 1rem;
        }

        .student-continue-action strong {
            font-size: 2rem;
            color: var(--green);
        }

        .student-course-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.85rem;
        }

        .student-course-grid .student-course-card {
            grid-template-columns: minmax(0, 1fr);
            align-items: stretch;
            gap: 0.75rem;
            min-height: 280px;
            background:
                linear-gradient(145deg, #ffffff 0%, #f8fbff 58%, #ecfdf5 100%);
            border-color: rgba(148,163,184,0.38);
            box-shadow: 0 16px 34px rgba(15,23,42,0.08);
            padding: 1rem;
        }

        .student-course-grid .student-course-card::after {
            display: none;
        }

        .student-course-grid .student-course-card-active {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.10), 0 18px 42px rgba(37,99,235,0.14);
        }

        .student-course-art {
            height: 106px;
            border-radius: 22px;
            background: linear-gradient(135deg, #eff6ff, #fff7ed);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .student-course-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-course-card-copy p {
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.45;
            margin: 0;
        }

        .student-course-status {
            width: fit-content;
            border-radius: 999px;
            background: rgba(5,150,105,0.11);
            color: var(--green);
            font-size: 0.68rem !important;
            font-weight: 900;
            padding: 0.32rem 0.52rem;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .student-course-meta,
        .student-progress-mini {
            display: flex;
            justify-content: space-between;
            gap: 0.7rem;
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 900;
        }

        .student-progress-bar {
            height: 9px;
            border-radius: 999px;
            overflow: hidden;
            background: #e2e8f0;
        }

        .student-progress-bar span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--green), var(--blue));
        }

        .student-course-open-btn {
            width: 100%;
        }

        .student-progress-card,
        .student-points-card {
            text-align: left;
        }

        .student-progress-card h2 {
            font-size: 2.4rem;
            margin: 0.2rem 0;
        }

        .student-progress-card p {
            color: var(--muted);
            margin: 0;
            font-weight: 800;
        }

        .student-progress-ring {
            width: 138px;
            height: 138px;
            border-radius: 50%;
            margin: 1rem auto;
            background: conic-gradient(var(--green) var(--progress), #e2e8f0 0);
            display: grid;
            place-items: center;
        }

        .student-progress-ring span {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: #fff;
            display: grid;
            place-items: center;
            color: var(--ink);
            font-size: 1.2rem;
            font-weight: 900;
        }

        .student-daily-bonus {
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr);
            gap: 0.8rem;
            align-items: center;
            background: linear-gradient(145deg, #ffffff, #fff7ed);
            border-color: #fed7aa;
        }

        .student-daily-bonus img {
            width: 76px;
            height: 76px;
            object-fit: contain;
        }

        .student-daily-bonus h2 {
            margin: 0.1rem 0;
        }

        .student-daily-bonus p {
            margin: 0;
            color: var(--muted);
            font-weight: 800;
        }

        .student-daily-bonus strong {
            color: var(--coral);
            font-weight: 900;
        }

        .student-bonus-claim-btn {
            grid-column: span 2;
            background: var(--coral);
            color: #fff;
            box-shadow: 0 12px 28px rgba(249,115,22,0.20);
        }

        .student-daily-bonus-compact {
            max-width: 520px;
            margin: 1.2rem auto 0;
            text-align: left;
        }

        .student-points-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.65rem;
            margin-top: 0.9rem;
        }

        .student-point-balance {
            border-radius: 18px;
            padding: 0.75rem;
            border: 1px solid rgba(148,163,184,0.25);
            display: grid;
            gap: 0.16rem;
        }

        .student-point-balance span,
        .student-point-balance small {
            color: var(--muted);
            font-size: 0.66rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .student-point-balance strong {
            font-size: 1.6rem;
            line-height: 1;
        }

        .student-point-blue {
            background: var(--soft-blue);
            color: var(--blue);
        }

        .student-point-green {
            background: var(--soft-green);
            color: var(--green);
        }

        .student-point-orange {
            background: var(--soft-coral);
            color: var(--coral);
        }

        .student-point-purple {
            background: var(--soft-purple);
            color: var(--purple);
        }

        body:has(.student-home-shell) .header {
            display: none;
        }
