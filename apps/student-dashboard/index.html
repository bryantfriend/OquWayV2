<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OquWay - Student Dashboard</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js",
                "firebase/functions": "https://www.gstatic.com/firebasejs/10.11.1/firebase-functions.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.11.1/firebase-storage.js"
            }
        }
    </script>
    <style>
        :root {
            --ink: #172033;
            --muted: #64748b;
            --paper: #ffffff;
            --line: #dbe5f2;
            --blue: #2563eb;
            --green: #059669;
            --amber: #b45309;
            --soft-blue: #eff6ff;
            --soft-green: #ecfdf5;
            --bg-color: #f7fbff;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 34%),
                linear-gradient(135deg, #f7fbff 0%, #edf7f3 54%, #fff8ed 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: rgba(255,255,255,0.84);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(219, 229, 242, 0.9);
            box-shadow: 0 12px 40px rgba(23, 32, 51, 0.06);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--blue);
        }

        main {
            flex: 1;
            padding: 2rem 1.5rem 3rem;
            max-width: 1240px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            font-family: inherit;
        }

        .student-hero,
        .student-course-heading,
        .student-player-topbar {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(219, 229, 242, 0.95);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(23, 32, 51, 0.09);
            padding: 1.35rem;
        }

        .student-hero,
        .student-course-heading,
        .student-player-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .student-hero h1,
        .student-course-heading h2,
        .student-player-topbar h1 {
            margin: 0.2rem 0;
            font-size: clamp(1.8rem, 4vw, 3.4rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .student-course-heading h2,
        .student-player-topbar h1 {
            font-size: clamp(1.35rem, 3vw, 2.4rem);
        }

        .student-hero p,
        .student-course-heading p,
        .student-player-topbar span {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .student-eyebrow {
            color: var(--green) !important;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin: 0 !important;
        }

        .student-hero-progress {
            background: var(--soft-green);
            border: 1px solid #bbf7d0;
            color: #047857;
            border-radius: 999px;
            padding: 0.75rem 1rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .student-reload-btn,
        .student-back-dashboard-btn,
        .student-complete-step-btn,
        .student-player-prev-btn,
        .student-player-next-btn {
            border: 0;
            border-radius: 999px;
            padding: 0.8rem 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
        }

        .student-reload-btn,
        .student-complete-step-btn {
            background: var(--green);
            color: white;
            box-shadow: 0 12px 28px rgba(5, 150, 105, 0.22);
        }

        .student-back-dashboard-btn,
        .student-player-prev-btn,
        .student-player-next-btn {
            background: var(--soft-blue);
            color: var(--blue);
            border: 1px solid #bfdbfe;
        }

        .student-reload-btn:hover,
        .student-back-dashboard-btn:hover,
        .student-complete-step-btn:hover,
        .student-player-prev-btn:hover,
        .student-player-next-btn:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
        }

        .student-warning,
        .student-error,
        .student-status {
            margin: 1rem 0;
            border-radius: 16px;
            padding: 0.85rem 1rem;
            font-weight: 800;
        }

        .student-warning {
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: var(--amber);
        }

        .student-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .student-status {
            background: var(--soft-green);
            border: 1px solid #bbf7d0;
            color: #047857;
        }

        .student-dashboard-grid {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .student-panel {
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(219, 229, 242, 0.95);
            border-radius: 24px;
            box-shadow: 0 18px 54px rgba(23, 32, 51, 0.08);
            padding: 1rem;
        }

        .student-panel h2 {
            margin: 0 0 0.9rem;
            font-size: 1rem;
        }

        .student-course-card,
        .student-module-card,
        .student-session-card,
        .student-practice-mode-card {
            width: 100%;
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 18px;
            padding: 0.9rem;
            text-align: left;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            transition: border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
        }

        .student-course-card:hover,
        .student-module-card:hover,
        .student-session-card:hover,
        .student-practice-mode-card:hover {
            border-color: #93c5fd;
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.10);
        }

        .student-course-card + .student-course-card,
        .student-module + .student-module,
        .student-session-card-shell + .student-session-card-shell {
            margin-top: 0.65rem;
        }

        .student-course-card span,
        .student-module-card span,
        .student-session-card span,
        .student-practice-mode-card strong {
            font-weight: 900;
            font-size: 1rem;
        }

        .student-course-card small,
        .student-module-card small,
        .student-session-card small,
        .student-practice-mode-card small {
            color: var(--green);
            font-weight: 900;
        }

        .student-course-card-active,
        .student-module-active,
        .student-session-active {
            border-color: var(--blue);
            background: var(--soft-blue);
        }

        .student-main-panel {
            min-height: 520px;
        }

        .student-big-progress {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            background: conic-gradient(var(--green), #d1fae5);
            color: #064e3b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            flex-shrink: 0;
        }

        .student-module {
            margin-top: 1rem;
        }

        .student-session-list {
            margin: 0.7rem 0 0 1rem;
            padding-left: 1rem;
            border-left: 2px solid #dbeafe;
        }

        .student-practice-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.7rem;
            margin: 0.7rem 0 0.9rem;
        }

        .student-practice-mode-card span {
            color: var(--muted);
            line-height: 1.4;
        }

        .student-practice-empty-mode {
            background: #f8fafc;
            color: #94a3b8;
        }

        .student-empty,
        .student-loading-card,
        .student-player-empty,
        .student-player-finished {
            background: rgba(255,255,255,0.86);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: 0 18px 54px rgba(23, 32, 51, 0.08);
            text-align: center;
            padding: 2.4rem 1.5rem;
            margin-top: 1rem;
        }

        .student-empty-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }

        .student-spinner {
            width: 34px;
            height: 34px;
            border: 4px solid #dbeafe;
            border-top-color: var(--blue);
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: studentSpin 0.8s linear infinite;
        }

        @keyframes studentSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .student-player-shell {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .student-player-progress {
            align-self: flex-start;
            background: var(--soft-green);
            color: #047857;
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            padding: 0.55rem 0.85rem;
            font-weight: 900;
        }

        .student-player-progress-track {
            height: 8px;
            background: #dbeafe;
            border-radius: 999px;
            overflow: hidden;
        }

        .student-player-progress-track div {
            height: 100%;
            background: linear-gradient(90deg, var(--green), #34d399);
            border-radius: 999px;
        }

        .student-player-canvas {
            display: flex;
            justify-content: center;
            padding: 1rem;
        }

        .student-step-player-target {
            width: min(860px, 100%);
        }

        .student-practice-player-root {
            min-height: 640px;
        }

        .course-player-shell {
            min-height: 640px;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 18% 0%, rgba(37,99,235,0.16), transparent 30%),
                radial-gradient(circle at 86% 8%, rgba(5,150,105,0.18), transparent 34%),
                linear-gradient(180deg, #f0f9ff 0%, #f8fafc 48%, #ffffff 100%);
            border: 1px solid var(--line);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(23,32,51,0.09);
            overflow: hidden;
        }

        .course-player-topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: rgba(255,255,255,0.9);
            border-bottom: 1px solid #dbeafe;
            backdrop-filter: blur(10px);
        }

        .course-player-back-btn,
        .course-player-nav-btn,
        .course-player-complete-btn,
        .course-player-restart-btn {
            border: 0;
            border-radius: 999px;
            padding: 0.75rem 1rem;
            font-weight: 900;
            cursor: pointer;
        }

        .course-player-back-btn,
        .course-player-nav-btn {
            background: var(--soft-blue);
            color: var(--blue);
            border: 1px solid #bfdbfe;
        }

        .course-player-complete-btn,
        .course-player-restart-btn {
            background: var(--green);
            color: #ffffff;
            box-shadow: 0 12px 28px rgba(5,150,105,0.22);
        }

        .course-player-title-block {
            min-width: 0;
            flex: 1;
        }

        .course-player-kicker {
            color: var(--green);
            font-size: 0.68rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .course-player-title-block h1 {
            margin: 0;
            font-size: clamp(1.35rem, 3vw, 2.35rem);
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .course-player-title-block p {
            margin: 0.25rem 0 0;
            color: var(--muted);
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .course-player-step-count {
            flex-shrink: 0;
            background: var(--soft-green);
            color: #047857;
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            padding: 0.55rem 0.85rem;
            font-weight: 900;
        }

        .course-player-progress-track {
            height: 8px;
            background: #dbeafe;
            overflow: hidden;
        }

        .course-player-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green));
            border-radius: 0 999px 999px 0;
            transition: width 0.24s ease;
        }

        .course-player-warning {
            margin: 1rem auto 0;
            width: min(860px, calc(100% - 2rem));
            border: 1px solid #fde68a;
            background: #fffbeb;
            color: var(--amber);
            border-radius: 16px;
            padding: 0.75rem 1rem;
            font-weight: 900;
        }

        .course-player-stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 1.5rem 1rem;
        }

        .course-player-step-card,
        .course-player-render-target {
            width: min(900px, 100%);
        }

        .course-player-footer {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            padding: 1rem;
            background: rgba(255,255,255,0.92);
            border-top: 1px solid var(--line);
        }

        .course-player-skip-note {
            display: none;
        }

        .course-player-empty-state,
        .course-player-complete-card {
            width: min(640px, calc(100% - 2rem));
            margin: 2rem auto;
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--line);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(23,32,51,0.09);
            padding: 2rem;
            text-align: center;
        }

        .course-player-empty-icon,
        .course-player-complete-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }

        .course-player-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.65rem;
            margin: 1.4rem 0;
        }

        .course-player-summary-grid div {
            background: #f8fafc;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 0.9rem 0.6rem;
        }

        .course-player-summary-grid strong,
        .course-player-summary-grid span {
            display: block;
        }

        .course-player-summary-grid strong {
            color: var(--ink);
            font-size: 1rem;
            font-weight: 900;
        }

        .course-player-summary-grid span {
            color: var(--muted);
            font-size: 0.66rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .course-player-complete-actions {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .course-player-fallback-label,
        .course-player-fallback-type {
            background: #f8fafc;
            border: 1px dashed var(--line);
            border-radius: 16px;
            color: var(--muted);
            padding: 0.8rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .student-player-footer {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .oqu-player-step {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: 0 18px 54px rgba(23, 32, 51, 0.10);
            padding: 1.6rem;
        }

        .oqu-player-step h2 {
            font-size: 2rem;
            line-height: 1.05;
            margin: 0 0 0.8rem;
        }

        .oqu-player-step p {
            color: var(--muted);
            line-height: 1.7;
        }

        .oqu-player-image {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 1rem;
            border: 1px solid var(--line);
        }

        .oqu-player-audio {
            width: 100%;
            margin: 0.7rem 0 1rem;
        }

        .oqu-player-translation,
        .oqu-player-callout,
        .oqu-player-note {
            background: var(--soft-green);
            color: #047857;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            padding: 0.8rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .oqu-player-complete-btn {
            width: 100%;
            border: none;
            border-radius: 18px;
            background: var(--blue);
            color: #fff;
            padding: 0.9rem 1rem;
            font-weight: 900;
            cursor: pointer;
        }

        .oqu-full-experience-step {
            position: relative;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        .oqu-experience-kicker {
            display: inline-flex;
            border-radius: 999px;
            background: rgba(37,99,235,0.10);
            color: var(--blue);
            padding: 0.35rem 0.65rem;
            font-size: 0.68rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            margin-bottom: 1rem;
        }

        .oqu-experience-hero,
        .oqu-cyber-mission-header,
        .oqu-island-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .oqu-experience-orb,
        .oqu-island-sun {
            width: 76px;
            height: 76px;
            flex-shrink: 0;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: var(--soft-blue);
            color: var(--blue);
        }

        .oqu-custom-experience-panel {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            border: 1px solid #bfdbfe;
            background: linear-gradient(135deg, #eff6ff, #f8fafc);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .oqu-experience-code,
        .oqu-cyber-code-area pre {
            white-space: pre-wrap;
            background: #0f172a;
            color: #bfdbfe;
            border-radius: 18px;
            padding: 1rem;
            font-size: 0.8rem;
            overflow-x: auto;
            margin: 0;
        }

        .oqu-cyber-mission-step {
            background: radial-gradient(circle at top right, rgba(34,211,238,0.20), transparent 32%), #08111f;
            color: #dbeafe;
            border-color: #1e3a8a;
        }

        .oqu-cyber-mission-step h2,
        .oqu-cyber-mission-step p {
            color: #e0f2fe;
        }

        .oqu-cyber-badge {
            border: 1px solid #22d3ee;
            color: #67e8f9;
            border-radius: 999px;
            padding: 0.45rem 0.7rem;
            font-size: 0.68rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .oqu-cyber-layout {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .oqu-cyber-panel,
        .oqu-cyber-code-area,
        .oqu-cyber-preview-area {
            border: 1px solid rgba(34,211,238,0.35);
            background: rgba(15,23,42,0.82);
            border-radius: 20px;
            padding: 1rem;
        }

        .oqu-cyber-preview-area {
            grid-column: span 2;
        }

        .oqu-cyber-window-label {
            color: #67e8f9;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            margin-bottom: 0.5rem;
        }

        .oqu-cyber-preview-box {
            border: 1px dashed rgba(103,232,249,0.50);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            color: #93c5fd;
        }

        .oqu-cyber-success {
            border: 1px solid rgba(74,222,128,0.40);
            background: rgba(20,83,45,0.34);
            color: #bbf7d0;
            border-radius: 18px;
            padding: 0.85rem;
            margin-bottom: 1rem;
            font-weight: 900;
        }

        .oqu-drag-island-step {
            background: linear-gradient(180deg, #ecfeff, #fef9c3 62%, #dcfce7);
            border-color: #bae6fd;
        }

        .oqu-island-board {
            border: 2px solid #7dd3fc;
            background: linear-gradient(135deg, rgba(125,211,252,0.26), rgba(255,255,255,0.72));
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .oqu-island-water {
            min-height: 150px;
            border: 2px dashed #38bdf8;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0369a1;
            font-weight: 900;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.45);
        }

        .oqu-island-card-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .oqu-island-card {
            background: #fff;
            border: 1px solid #facc15;
            border-radius: 14px;
            padding: 0.6rem 0.8rem;
            color: #92400e;
            font-size: 0.78rem;
            font-weight: 900;
            box-shadow: 0 8px 18px rgba(180,83,9,0.12);
        }

        .oqu-player-scale {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .oqu-player-scale span {
            background: var(--soft-blue);
            color: var(--blue);
            border-radius: 14px;
            text-align: center;
            padding: 0.8rem 0;
            font-weight: 900;
        }

        .oqu-player-text-response {
            width: 100%;
            min-height: 120px;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 0.8rem;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        .oqu-player-record-shell,
        .oqu-player-empty-media,
        .oqu-player-details {
            border: 1px dashed var(--line);
            background: #f8fafc;
            color: var(--muted);
            border-radius: 18px;
            padding: 1rem;
